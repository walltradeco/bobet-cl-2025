<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BoBet · Прогнози</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E1410; --panel:#151D17; --panel-2:#1B251D; --panel-3:#212D23;
    --line:#2A362B; --text:#EDEFE8; --text-dim:#8B9A8C;
    --gold:#E8B23C; --teal:#6FAFAF; --blue:#5E97D0; --purple:#A98FDB;
    --purple-soft:rgba(169,143,219,0.12); --green:#4CAE6B;
    --green-soft:rgba(76,174,107,0.14); --red:#C75C4A;
    --red-soft:rgba(199,92,74,0.14); --gold-soft:rgba(232,178,60,0.10);
    --field-line:rgba(237,239,232,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:repeating-linear-gradient(0deg,var(--field-line) 0px,var(--field-line) 1px,transparent 1px,transparent 64px),var(--bg);
    color:var(--text); font-family:'Inter',sans-serif; min-height:100vh;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 120px;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .grotesk{font-family:'Space Grotesk',sans-serif;}

  /* ---------- HEADER ---------- */
  header{padding:22px 0 16px;border-bottom:1px solid var(--line);margin-bottom:18px;}
  .head-row{display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .brand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;letter-spacing:-0.01em;}
  .brand span{color:var(--gold);}
  .whoami{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);text-align:right;}
  .whoami b{color:var(--purple);display:block;font-size:14px;}

  /* ---------- TABS ---------- */
  nav.tabs{display:flex;gap:6px;overflow-x:auto;margin:14px 0 18px;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
  nav.tabs button{
    background:var(--panel);border:1px solid var(--line);color:var(--text-dim);
    font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:14px;
    padding:9px 14px;border-radius:8px;white-space:nowrap;cursor:pointer;
  }
  nav.tabs button.on{background:var(--panel-3);color:var(--text);border-color:var(--gold);}

  /* ---------- CARDS ---------- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;}
  .card.tight{padding:12px;}
  h2{font-family:'Space Grotesk',sans-serif;font-size:17px;margin:0 0 12px;font-weight:700;}
  .dim{color:var(--text-dim);font-size:13px;line-height:1.5;}

  /* ---------- DEADLINE ---------- */
  .deadline{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--gold-soft);border:1px solid rgba(232,178,60,0.3);
    border-radius:10px;padding:12px 14px;margin-bottom:14px;
  }
  .deadline .t{font-family:'JetBrains Mono',monospace;font-size:19px;color:var(--gold);font-weight:700;}
  .deadline.closed{background:var(--red-soft);border-color:rgba(199,92,74,0.35);}
  .deadline.closed .t{color:var(--red);font-size:15px;}

  /* ---------- MATCH ROW ---------- */
  .match{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--panel-2);}
  .match.boosted{border-color:var(--purple);background:var(--purple-soft);}
  .match.autopilot{border-color:var(--gold);background:var(--gold-soft);}
  .match-teams{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .team{flex:1;font-size:14px;font-weight:600;}
  .team.away{text-align:right;}
  .vs{font-family:'JetBrains Mono',monospace;color:var(--text-dim);font-size:12px;}
  .score-in{display:flex;align-items:center;justify-content:center;gap:10px;}
  .score-in input{
    width:62px;height:52px;text-align:center;
    font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;
    background:var(--panel-3);border:1px solid var(--line);border-radius:9px;color:var(--text);
  }
  .score-in input:focus{outline:none;border-color:var(--gold);}
  .score-in .sep{font-family:'JetBrains Mono',monospace;color:var(--text-dim);font-size:20px;}
  .actual{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--teal);text-align:center;margin-top:8px;}
  .pts{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);font-weight:700;}

  /* ---------- BOOST PICKER ---------- */
  .ap-tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--gold);margin-bottom:7px;}
  .match.ap-pick{cursor:pointer;border-style:dashed;}
  .match.ap-blocked{opacity:0.4;cursor:not-allowed;border-style:solid;}
  .boost-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
  .boost-chip{
    background:var(--panel-3);border:1px solid var(--line);color:var(--text-dim);
    font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 10px;
    border-radius:7px;cursor:pointer;
  }
  .boost-chip.on{border-color:var(--purple);color:var(--purple);background:var(--purple-soft);}
  .boost-chip:disabled{opacity:0.3;cursor:not-allowed;}

  /* ---------- BUTTONS ---------- */
  button.primary{
    width:100%;background:var(--gold);color:#1a1206;border:none;border-radius:10px;
    padding:15px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;cursor:pointer;
  }
  button.primary:disabled{background:var(--panel-3);color:var(--text-dim);cursor:not-allowed;}
  button.ghost{
    background:transparent;border:1px solid var(--line);color:var(--text-dim);
    border-radius:8px;padding:10px 14px;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;
  }

  /* ---------- REVIEW MODAL ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;
    align-items:flex-end;justify-content:center;z-index:100;padding:0;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px 14px 0 0;
    padding:20px 16px 28px;width:100%;max-width:760px;max-height:88vh;overflow-y:auto;}
  .rev-line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .rev-line .s{font-family:'JetBrains Mono',monospace;font-weight:700;}

  /* ---------- DRAFT ---------- */
  .budget{position:sticky;top:0;background:var(--panel-3);border:1px solid var(--gold);
    border-radius:10px;padding:12px 14px;margin-bottom:14px;z-index:10;}
  .budget .bar{height:7px;background:var(--panel);border-radius:4px;margin-top:8px;overflow:hidden;}
  .budget .fill{height:100%;background:var(--gold);transition:width 0.2s;}
  .budget .fill.over{background:var(--red);}
  .qty{display:flex;align-items:center;gap:10px;}
  .qty button{width:34px;height:34px;border-radius:8px;background:var(--panel-3);
    border:1px solid var(--line);color:var(--text);font-size:18px;cursor:pointer;}
  .qty .n{font-family:'JetBrains Mono',monospace;font-size:17px;min-width:22px;text-align:center;font-weight:700;}

  /* ---------- TABLE ---------- */
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:0.06em;text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);}
  td{padding:9px 6px;border-bottom:1px solid var(--line);}
  td.n{font-family:'JetBrains Mono',monospace;font-weight:700;}
  .medal{font-size:15px;}

  /* ---------- CHECKS ---------- */
  .checks{display:flex;flex-wrap:wrap;gap:7px;}
  .chk{display:flex;align-items:center;gap:6px;background:var(--panel-2);
    border:1px solid var(--line);border-radius:20px;padding:5px 11px;font-size:13px;}
  .chk.yes{border-color:var(--green);color:var(--green);}
  .chk.no{color:var(--text-dim);}

  /* ---------- LOGIN ---------- */
  .login{max-width:380px;margin:8vh auto 0;text-align:center;}
  .login h1{font-family:'Space Grotesk',sans-serif;font-size:34px;margin:0 0 6px;}
  .login h1 span{color:var(--gold);}
  .login input{
    width:100%;padding:15px;margin:8px 0;background:var(--panel-2);
    border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:16px;
    font-family:'Inter',sans-serif;text-align:center;
  }
  .login input.code{font-family:'JetBrains Mono',monospace;font-size:30px;letter-spacing:0.35em;font-weight:700;}
  .login input:focus{outline:none;border-color:var(--gold);}

  .msg{padding:11px 13px;border-radius:9px;font-size:14px;margin:10px 0;}
  .msg.err{background:var(--red-soft);border:1px solid rgba(199,92,74,0.35);color:var(--red);}
  .msg.ok{background:var(--green-soft);border:1px solid rgba(76,174,107,0.35);color:var(--green);}
  .hide{display:none !important;}
  .spin{text-align:center;padding:40px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>

<!-- ============ ЕКРАН ВХОДУ ============ -->
<div id="screen-login" class="wrap">
  <div class="login">
    <h1>Bo<span>Bet</span></h1>
    <p class="dim" style="margin-bottom:24px">Fantasy League</p>

    <div id="step-email">
      <p class="dim" style="margin-bottom:14px">Вкажи пошту — надішлемо код</p>
      <input type="email" id="in-email" placeholder="пошта" autocomplete="email" inputmode="email">
      <button class="primary" id="btn-send">Надіслати код</button>
    </div>

    <div id="step-code" class="hide">
      <p class="dim" style="margin-bottom:14px">Код із листа. Перевір і спам.</p>
      <input type="text" id="in-code" class="code" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
      <button class="primary" id="btn-verify">Увійти</button>
      <button class="ghost" id="btn-back" style="margin-top:10px;width:100%">Інша пошта</button>
    </div>

    <div id="login-msg"></div>
  </div>
</div>

<!-- ============ ЗАСТОСУНОК ============ -->
<div id="screen-app" class="wrap hide">
  <header>
    <div class="head-row">
      <div class="brand">Bo<span>Bet</span></div>
      <div class="whoami">
        <b id="my-name">—</b>
        <span id="my-email"></span>
        <button class="ghost" id="btn-logout" style="padding:3px 8px;font-size:11px;margin-top:5px">вийти</button>
      </div>
    </div>
    <nav class="tabs" id="tabs"></nav>
  </header>
  <div id="view"><div class="spin">завантаження…</div></div>
</div>

<div id="modal-host"></div>

<script type="module">
// =====================================================================
//  НАЛАШТУВАННЯ — вписати після створення проєкту в Supabase
//  Settings → API. anon key публічний, його можна тримати тут:
//  захист не в ключі, а в правилах доступу бази.
//  service_role key сюди НЕ КЛАСТИ НІКОЛИ.
// =====================================================================
const SUPABASE_URL  = 'https://wsdamzcezumjmgxmvakw.supabase.co';
const SUPABASE_ANON = 'sb_publishable_bkXuSYswtmg4xCtecLb9cw_No0oCuSo';
const TOURNAMENT_ID = '11111111-1111-1111-1111-111111111111';

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// =====================================================================
//  Стан
// =====================================================================
const S = {
  me: null,
  tab: 'matches',
  gameweeks: [],
  gw: null,          // поточний вікенд
  matches: [],
  myPred: {},        // match_id -> {home, away, home2, away2, boost_unit_id}
  stock: [],         // мій склад бустів
  prices: [],
  boostTypes: [],
  ap: { unit: null, picks: [] },   // Автопілот: юніт і два матчі-кандидати
};

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function msg(host, text, kind='err'){
  host.innerHTML = `<div class="msg ${kind}">${esc(text)}</div>`;
}

// Зворотний відлік, не абсолютний час (U-10)
function countdown(iso){
  const ms = new Date(iso) - new Date();
  if (ms <= 0) return null;
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const d = Math.floor(h / 24);
  if (d >= 1) return `${d} дн ${h % 24} год`;
  if (h >= 1) return `${h} год ${m} хв`;
  return `${m} хв`;
}

// =====================================================================
//  ВХІД (U-1)
// =====================================================================
$('btn-send').onclick = async () => {
  const email = $('in-email').value.trim().toLowerCase();
  if (!email) return msg($('login-msg'), 'Вкажи пошту');
  $('btn-send').disabled = true;
  $('btn-send').textContent = 'надсилаю…';

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { shouldCreateUser: true }
  });

  $('btn-send').disabled = false;
  $('btn-send').textContent = 'Надіслати код';

  if (error) {
    // Тригер бази відбиває пошту не зі списку
    const t = /не.*доступ|not allowed|Database error/i.test(error.message)
      ? 'Немає доступу — ця пошта не в списку учасників'
      : error.message;
    return msg($('login-msg'), t);
  }

  window.__email = email;
  $('step-email').classList.add('hide');
  $('step-code').classList.remove('hide');
  $('login-msg').innerHTML = '';
  $('in-code').focus();
};

$('btn-verify').onclick = async () => {
  const token = $('in-code').value.trim();
  if (token.length !== 6) return msg($('login-msg'), 'Код — шість цифр');
  $('btn-verify').disabled = true;

  const { error } = await sb.auth.verifyOtp({
    email: window.__email, token, type: 'email'
  });
  $('btn-verify').disabled = false;

  if (error) return msg($('login-msg'), 'Код не підійшов. Перевір або запроси новий.');
  boot();
};

$('btn-back').onclick = () => {
  $('step-code').classList.add('hide');
  $('step-email').classList.remove('hide');
  $('login-msg').innerHTML = '';
};

$('in-code').addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/\D/g, '');
  if (e.target.value.length === 6) $('btn-verify').click();
});

$('btn-logout').onclick = async () => { await sb.auth.signOut(); location.reload(); };

// =====================================================================
//  Запуск
// =====================================================================
async function boot(){
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    $('screen-login').classList.remove('hide');
    $('screen-app').classList.add('hide');
    return;
  }

  const { data: meRows, error } = await sb.rpc('me', { p_tournament: TOURNAMENT_ID });
  if (error || !meRows || !meRows.length) {
    $('screen-login').classList.remove('hide');
    return msg($('login-msg'), 'Профіль не знайдено в цьому турнірі');
  }
  S.me = meRows[0];

  $('screen-login').classList.add('hide');
  $('screen-app').classList.remove('hide');
  $('my-name').textContent = S.me.display_name;
  $('my-email').textContent = S.me.email || '';

  await loadRefs();
  renderTabs();
  await go(S.tab);
}

async function loadRefs(){
  const [gw, bt, bp] = await Promise.all([
    sb.from('gameweek_status').select('*').eq('tournament_id', TOURNAMENT_ID).order('number'),
    sb.from('boost_types').select('*').order('sort_order'),
    sb.from('boost_prices').select('*').eq('tournament_id', TOURNAMENT_ID),
  ]);
  S.gameweeks  = gw.data || [];
  S.boostTypes = bt.data || [];
  S.prices     = bp.data || [];

  // За замовчуванням — найближчий незакритий вікенд
  S.gw = S.gameweeks.find(g => !g.is_open) || S.gameweeks[S.gameweeks.length - 1] || null;
}

function priceOf(code){
  const p = S.prices.find(x => x.boost_code === code);
  return p ? p.price : 0;
}
function typeOf(code){
  return S.boostTypes.find(x => x.code === code) || { title: code, description: '' };
}

// =====================================================================
//  Вкладки
// =====================================================================
function renderTabs(){
  const tabs = [
    ['matches', 'Матчі'],
    ['draft',   'Драфт'],
    ['stock',   'Склади'],
    ['board',   'Лідерборд'],
    ['log',     'Журнал'],
  ];
  if (S.me.is_admin) tabs.push(['admin', 'Адмінка']);

  $('tabs').innerHTML = tabs.map(([k, t]) =>
    `<button data-tab="${k}" class="${S.tab === k ? 'on' : ''}">${t}</button>`
  ).join('');

  $('tabs').querySelectorAll('button').forEach(b => {
    b.onclick = () => go(b.dataset.tab);
  });
}

async function go(tab){
  S.tab = tab;
  renderTabs();
  $('view').innerHTML = '<div class="spin">завантаження…</div>';
  try {
    if (tab === 'matches') await viewMatches();
    else if (tab === 'draft') await viewDraft();
    else if (tab === 'stock') await viewStock();
    else if (tab === 'board') await viewBoard();
    else if (tab === 'log')   await viewLog();
    else if (tab === 'admin') await viewAdmin();
  } catch (e) {
    $('view').innerHTML = `<div class="msg err">${esc(e.message || e)}</div>`;
  }
}

// =====================================================================
//  МАТЧІ — внесення прогнозів (U-4, U-5, U-6, U-8)
// =====================================================================
async function loadGameweek(gwId){
  const [mb, st] = await Promise.all([
    sb.from('match_board').select('*').eq('gameweek_id', gwId),
    sb.from('my_boost_stock').select('*').eq('participant_id', S.me.participant_id),
  ]);

  const rows = mb.data || [];
  S.stock = st.data || [];

  // Унікальні матчі
  const seen = new Map();
  for (const r of rows) {
    if (!seen.has(r.match_id)) {
      seen.set(r.match_id, {
        match_id: r.match_id, position: r.position,
        home_team: r.home_team, away_team: r.away_team,
        status: r.status, home_score: r.home_score, away_score: r.away_score,
        others: []
      });
    }
    const m = seen.get(r.match_id);
    if (r.participant_id === S.me.participant_id) {
      S.myPred[r.match_id] = {
        home: r.pred_home, away: r.pred_away,
        home2: r.pred_home_2, away2: r.pred_away_2,
        boost: r.boost_code, points: r.total_points,
        base: r.base_points, note: r.breakdown?.note
      };
    } else if (r.participant_id) {
      m.others.push(r);
    }
  }
  S.matches = [...seen.values()].sort((a, b) => a.position - b.position);
}

async function viewMatches(){
  if (!S.gameweeks.length) {
    $('view').innerHTML = `<div class="card"><h2>Матчів ще немає</h2>
      <p class="dim">Адмін ще не завів розклад вікендів.</p></div>`;
    return;
  }
  if (!S.gw) S.gw = S.gameweeks[0];
  await loadGameweek(S.gw.gameweek_id);

  const left = countdown(S.gw.deadline_at);
  const open = S.gw.is_open;

  const gwPicker = S.gameweeks.map(g =>
    `<button class="boost-chip ${g.gameweek_id === S.gw.gameweek_id ? 'on' : ''}"
      data-gw="${g.gameweek_id}">${esc(g.title || ('Вікенд ' + g.number))}</button>`
  ).join('');

  const missing = S.matches.filter(m => !S.myPred[m.match_id]).length;

  let html = `
    <div class="boost-row" style="margin-bottom:14px">${gwPicker}</div>
    <div class="deadline ${open ? 'closed' : ''}">
      <div>
        <div class="dim" style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase">
          ${open ? 'прогнози відкрито' : 'до закриття'}</div>
        <div class="t">${open ? 'вікенд закрито' : (left || 'закрито')}</div>
      </div>
      <div style="text-align:right">
        <div class="dim" style="font-size:11px">без прогнозу</div>
        <div class="t" style="font-size:19px">${missing}</div>
      </div>
    </div>`;

  if (S.gw.deadline_note) {
    html += `<div class="msg ok">Дедлайн зсунуто: ${esc(S.gw.deadline_note)}</div>`;
  }

  html += `<div class="card tight">
    <div class="dim" style="margin-bottom:8px">Підтвердили ${S.gw.confirmed_count} з ${S.gw.participant_count}</div>
    <div class="checks" id="checks"></div></div>
    <div id="ap-bar"></div>`;

  for (const m of S.matches) {
    const p = S.myPred[m.match_id] || {};
    const isAp = S.ap.picks.includes(m.match_id);
    const cls = (p.boost === 'autopilot' || isAp) ? 'autopilot' : (p.boost ? 'boosted' : '');
    html += `
    <div class="match ${cls}" data-match="${m.match_id}">
      ${isAp ? '<div class="ap-tag">Автопілот · кандидат</div>' : ''}
      ${p.boost === 'autopilot' ? '<div class="ap-tag">Автопілот спрацював</div>' : ''}
      <div class="match-teams">
        <div class="team">${esc(m.home_team)}</div>
        <div class="vs">—</div>
        <div class="team away">${esc(m.away_team)}</div>
      </div>
      <div class="score-in">
        <input type="number" min="0" max="20" inputmode="numeric" pattern="[0-9]*"
               class="sc-h" value="${p.home ?? ''}" ${open ? 'disabled' : ''}>
        <span class="sep">:</span>
        <input type="number" min="0" max="20" inputmode="numeric" pattern="[0-9]*"
               class="sc-a" value="${p.away ?? ''}" ${open ? 'disabled' : ''}>
      </div>
      <div class="dp-wrap ${p.boost === 'double_predict' || p.home2 != null ? '' : 'hide'}">
        <div class="dim" style="text-align:center;margin:8px 0 4px;font-size:12px">
          другий рахунок</div>
        <div class="score-in">
          <input type="number" min="0" max="20" inputmode="numeric" pattern="[0-9]*"
                 class="sc-h2" value="${p.home2 ?? ''}" ${open ? 'disabled' : ''}
                 style="height:44px;font-size:20px">
          <span class="sep">:</span>
          <input type="number" min="0" max="20" inputmode="numeric" pattern="[0-9]*"
                 class="sc-a2" value="${p.away2 ?? ''}" ${open ? 'disabled' : ''}
                 style="height:44px;font-size:20px">
        </div>
      </div>
      ${m.status === 'played' ? renderBreakdown(m, p) : ''}
      ${open ? '' : `<div class="boost-row" data-boosts="${m.match_id}"></div>`}
    </div>`;
  }

  if (!open) {
    html += `<button class="primary" id="btn-confirm" style="margin-top:14px">Підтверджую</button>
      <p class="dim" style="text-align:center;margin-top:10px">
      Перед збереженням покажемо, що саме ти обрав.</p>`;
  }

  $('view').innerHTML = html;

  // Перемикач вікендів
  $('view').querySelectorAll('[data-gw]').forEach(b => {
    b.onclick = () => {
      S.gw = S.gameweeks.find(g => g.gameweek_id === b.dataset.gw);
      S.myPred = {};
      go('matches');
    };
  });

  await renderChecks();
  if (!open) { renderBoostPickers(); renderAutopilotBar(); }
  const cb = $('btn-confirm');
  if (cb) cb.onclick = reviewAndSave;
}

// ---------------------------------------------------------------------
//  U-13: звідки взялись бали за матч
// ---------------------------------------------------------------------
function renderBreakdown(m, p){
  if (p.points == null) {
    return `<div class="actual">факт ${m.home_score}:${m.away_score}
      · <span class="dim">прогнозу не було</span></div>`;
  }
  const parts = [];
  const base = p.base ?? p.points;
  parts.push(`рахунок → ${base} бал${base === 1 ? '' : (base ? 'и' : 'ів')}`);
  if (p.note) parts.push(esc(p.note));

  return `<div class="actual">факт ${m.home_score}:${m.away_score}
    · <span class="pts">${p.points} бал${p.points === 1 ? '' : 'и'}</span>
    <div class="dim" style="font-size:12px;margin-top:3px">${parts.join(' · ')}</div></div>`;
}

// ---------------------------------------------------------------------
//  Автопілот: два матчі-кандидати замість одного (U-8)
// ---------------------------------------------------------------------
function renderAutopilotBar(){
  const host = $('ap-bar');
  if (!host) return;

  // юніти Автопілота: вільні або вже розкладені на цей вікенд
  const units = S.stock.filter(u => u.boost_code === 'autopilot');
  if (!units.length) { host.innerHTML = ''; return; }

  const unit = S.ap.unit || units.find(u => u.status === 'in_stock') || units[0];
  S.ap.unit = unit;

  // якщо кандидати вже збережені — підтягуємо
  if (!S.ap.picks.length && unit.autopilot_candidates) {
    S.ap.picks = unit.autopilot_candidates.filter(
      id => S.matches.some(m => m.match_id === id));
  }

  const n = S.ap.picks.length;
  host.innerHTML = `
    <div class="card tight" style="border-color:var(--gold);background:var(--gold-soft)">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
        <div>
          <b style="color:var(--gold)">Автопілот</b>
          <div class="dim" style="margin-top:3px">
            Обери два матчі — система сама подвоїть той, де вийде більше балів.</div>
        </div>
        <div class="mono" style="font-size:19px;font-weight:700;color:var(--gold)">${n}/2</div>
      </div>
      <button class="ghost" id="ap-toggle" style="width:100%;margin-top:10px">
        ${S.ap.on ? 'Готово' : (n ? 'Змінити кандидатів' : 'Обрати кандидатів')}</button>
    </div>`;

  $('ap-toggle').onclick = () => {
    if (S.ap.on && S.ap.picks.length === 2) { saveAutopilot(); return; }
    S.ap.on = !S.ap.on;
    paintAutopilotTargets();
    renderAutopilotBar();
  };

  paintAutopilotTargets();
}

function paintAutopilotTargets(){
  for (const m of S.matches) {
    const card = $('view').querySelector(`[data-match="${m.match_id}"]`);
    if (!card) continue;
    const picked = S.ap.picks.includes(m.match_id);

    card.classList.toggle('autopilot', picked);
    card.classList.toggle('ap-pick', !!S.ap.on);

    card.onclick = null;
    if (!S.ap.on) continue;

    // Матч, на якому вже стоїть інший буст, кандидатом бути не може
    const busy = S.myPred[m.match_id]?.boost && S.myPred[m.match_id].boost !== 'autopilot';
    if (busy) { card.classList.add('ap-blocked'); continue; }
    card.classList.remove('ap-blocked');

    card.onclick = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
      const i = S.ap.picks.indexOf(m.match_id);
      if (i >= 0) S.ap.picks.splice(i, 1);
      else if (S.ap.picks.length < 2) S.ap.picks.push(m.match_id);
      else { alert('Уже обрано два матчі. Зніми один, щоб додати інший.'); return; }
      renderAutopilotBar();
    };
  }
}

async function saveAutopilot(){
  const { error } = await sb.rpc('set_autopilot', {
    p_boost_unit: S.ap.unit.boost_unit_id,
    p_match_a: S.ap.picks[0],
    p_match_b: S.ap.picks[1]
  });
  if (error) return alert('Помилка: ' + error.message);
  S.ap.on = false;
  alert('Автопілот заявлено на два матчі');
  S.myPred = {};
  go('matches');
}

async function renderChecks(){
  const { data } = await sb.from('confirmation_board').select('*')
    .eq('gameweek_id', S.gw.gameweek_id);
  const host = $('checks');
  if (!host) return;
  host.innerHTML = (data || [])
    .sort((a, b) => Number(b.confirmed) - Number(a.confirmed))
    .map(c => `<div class="chk ${c.confirmed ? 'yes' : 'no'}">
      ${c.confirmed ? '✓' : '○'} ${esc(c.display_name)}
      ${c.confirmed && c.skipped_count ? `<span class="dim">(-${c.skipped_count})</span>` : ''}
    </div>`).join('');
}

// Бусти: показуємо лише те, що є в складі і ще не витрачено
function renderBoostPickers(){
  const free = S.stock.filter(u => u.status === 'in_stock');
  const byCode = {};
  for (const u of free) (byCode[u.boost_code] ||= []).push(u);

  for (const m of S.matches) {
    const host = $('view').querySelector(`[data-boosts="${m.match_id}"]`);
    if (!host) continue;
    const cur = S.myPred[m.match_id]?.boost;

    let chips = '';
    for (const code of Object.keys(byCode)) {
      if (code === 'autopilot') continue;   // Автопілот ставиться окремо
      const t = typeOf(code);
      const on = cur === code;
      chips += `<button class="boost-chip ${on ? 'on' : ''}"
        data-set-boost="${m.match_id}" data-code="${code}"
        title="${esc(t.description)}">${esc(t.title)} ×${byCode[code].length}</button>`;
    }
    if (cur && cur !== 'autopilot') {
      chips += `<button class="boost-chip" data-set-boost="${m.match_id}" data-code="">зняти</button>`;
    }
    host.innerHTML = chips || '<span class="dim" style="font-size:12px">бустів у складі немає</span>';
  }

  $('view').querySelectorAll('[data-set-boost]').forEach(b => {
    b.onclick = () => {
      const id = b.dataset.setBoost;
      S.myPred[id] = S.myPred[id] || {};
      S.myPred[id].boost = b.dataset.code || null;
      collectScores();
      renderBoostPickers();

      const card = $('view').querySelector(`[data-match="${id}"]`);
      card.className = 'match' + (b.dataset.code ? ' boosted' : '');

      // Double Predict відкриває поля для другого рахунку
      const dp = card.querySelector('.dp-wrap');
      if (dp) dp.classList.toggle('hide', b.dataset.code !== 'double_predict');

      // Матч із бустом не може бути кандидатом Автопілота
      if (b.dataset.code) {
        const i = S.ap.picks.indexOf(id);
        if (i >= 0) { S.ap.picks.splice(i, 1); renderAutopilotBar(); }
      }
    };
  });
}

function collectScores(){
  for (const m of S.matches) {
    const card = $('view').querySelector(`[data-match="${m.match_id}"]`);
    if (!card) continue;
    const h = card.querySelector('.sc-h').value;
    const a = card.querySelector('.sc-a').value;
    const h2 = card.querySelector('.sc-h2')?.value ?? '';
    const a2 = card.querySelector('.sc-a2')?.value ?? '';
    S.myPred[m.match_id] = S.myPred[m.match_id] || {};
    S.myPred[m.match_id].home = h === '' ? null : Number(h);
    S.myPred[m.match_id].away = a === '' ? null : Number(a);
    S.myPred[m.match_id].home2 = h2 === '' ? null : Number(h2);
    S.myPred[m.match_id].away2 = a2 === '' ? null : Number(a2);
  }
}

// Екран перевірки перед записом (U-5)
function reviewAndSave(){
  collectScores();
  const filled = S.matches.filter(m => {
    const p = S.myPred[m.match_id];
    return p && p.home != null && p.away != null;
  });
  const skipped = S.matches.length - filled.length;

  let body = filled.map(m => {
    const p = S.myPred[m.match_id];
    return `<div class="rev-line">
      <span>${esc(m.home_team)} — ${esc(m.away_team)}
        ${p.boost ? `<span style="color:var(--purple)">· ${esc(typeOf(p.boost).title)}</span>` : ''}</span>
      <span class="s">${p.home}:${p.away}${
        p.boost === 'double_predict' && p.home2 != null
          ? ` / ${p.home2}:${p.away2}` : ''}</span></div>`;
  }).join('');

  if (skipped) {
    body += `<div class="msg err" style="margin-top:12px">
      У тебе ${skipped} ${skipped === 1 ? 'матч' : 'матчі'} без прогнозу — за них буде нуль.
      Точно підтверджуєш?</div>`;
  }

  showModal('Перевір, що обрав', body, async () => {
    for (const m of filled) {
      const p = S.myPred[m.match_id];
      const unit = p.boost
        ? S.stock.find(u => u.boost_code === p.boost && u.status === 'in_stock')
        : null;
      const { error } = await sb.rpc('save_prediction', {
        p_match: m.match_id, p_home: p.home, p_away: p.away,
        p_home_2: p.boost === 'double_predict' ? (p.home2 ?? null) : null,
        p_away_2: p.boost === 'double_predict' ? (p.away2 ?? null) : null,
        p_boost_unit: unit ? unit.boost_unit_id : null
      });
      if (error) throw new Error(error.message);
    }
    const { data, error } = await sb.rpc('confirm_gameweek', { p_gameweek: S.gw.gameweek_id });
    if (error) throw new Error(error.message);
    closeModal();
    await loadRefs();
    await go('matches');
    alert(data.opened
      ? 'Збережено. Усі підтвердили — прогнози відкрились!'
      : `Збережено. Підтвердили ${data.confirmed} з ${data.total}.`);
  });
}

// =====================================================================
//  ДРАФТ БУСТІВ (U-8a)
// =====================================================================
async function viewDraft(){
  const { data: t } = await sb.from('tournaments').select('*').eq('id', TOURNAMENT_ID).single();
  const { data: stock } = await sb.from('my_boost_stock').select('*')
    .eq('participant_id', S.me.participant_id);

  const closed = new Date(t.draft_deadline) <= new Date();
  const cur = {};
  for (const u of (stock || [])) cur[u.boost_code] = (cur[u.boost_code] || 0) + 1;

  const state = { ...cur };
  const budget = t.budget;

  function spent(){
    return Object.entries(state).reduce((s, [c, q]) => s + priceOf(c) * q, 0);
  }

  function draw(){
    const sp = spent();
    const left = budget - sp;
    const pct = Math.min(100, sp / budget * 100);

    $('view').innerHTML = `
      <div class="budget">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span class="dim">Витрачено</span>
          <span class="mono" style="font-size:19px;font-weight:700;color:${left < 0 ? 'var(--red)' : 'var(--gold)'}">
            ${sp} / ${budget}</span>
        </div>
        <div class="bar"><div class="fill ${left < 0 ? 'over' : ''}" style="width:${pct}%"></div></div>
        <div class="dim" style="margin-top:6px">Залишок: <b class="mono">${left}</b> рексів</div>
      </div>
      ${closed ? '<div class="msg err">Драфт закрито, склад зафіксовано</div>' : ''}
      ${S.boostTypes.map(b => `
        <div class="card tight">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
            <div style="flex:1">
              <div style="font-weight:700;font-size:15px">${esc(b.title)}
                <span class="mono" style="color:var(--gold);font-size:13px">${priceOf(b.code)}р</span></div>
              <div class="dim" style="margin-top:4px">${esc(b.description)}</div>
            </div>
            <div class="qty">
              <button data-m="${b.code}" ${closed ? 'disabled' : ''}>−</button>
              <span class="n">${state[b.code] || 0}</span>
              <button data-p="${b.code}" ${closed ? 'disabled' : ''}>+</button>
            </div>
          </div>
        </div>`).join('')}
      <button class="primary" id="btn-draft" ${closed || left < 0 || sp === 0 ? 'disabled' : ''}>
        ${left < 0 ? 'Перевитрата' : 'Підтверджую склад'}</button>
      <p class="dim" style="text-align:center;margin-top:10px">
        До старту турніру склад можна переграти скільки завгодно.</p>`;

    $('view').querySelectorAll('[data-p]').forEach(b => b.onclick = () => {
      state[b.dataset.p] = (state[b.dataset.p] || 0) + 1; draw();
    });
    $('view').querySelectorAll('[data-m]').forEach(b => b.onclick = () => {
      state[b.dataset.m] = Math.max(0, (state[b.dataset.m] || 0) - 1); draw();
    });

    const db = $('btn-draft');
    if (db) db.onclick = () => {
      const items = Object.entries(state).filter(([, q]) => q > 0);
      const body = items.map(([c, q]) =>
        `<div class="rev-line"><span>${esc(typeOf(c).title)} × ${q}</span>
         <span class="s">${priceOf(c) * q}р</span></div>`).join('') +
        `<div class="rev-line" style="border:none;margin-top:8px">
          <span><b>Разом</b></span><span class="s">${spent()} з ${budget}</span></div>`;

      showModal('Твій склад бустів', body, async () => {
        const { error } = await sb.rpc('submit_draft', {
          p_tournament: TOURNAMENT_ID,
          p_items: items.map(([code, qty]) => ({ code, qty }))
        });
        if (error) throw new Error(error.message);
        closeModal();
        await go('draft');
        alert('Склад збережено');
      });
    };
  }
  draw();
}

async function viewStock(){
  const { data } = await sb.from('my_boost_stock').select('*').eq('tournament_id', TOURNAMENT_ID);
  const { data: parts } = await sb.from('participants').select('*').eq('tournament_id', TOURNAMENT_ID);

  const byP = {};
  for (const u of (data || [])) (byP[u.participant_id] ||= []).push(u);

  let html = '';
  for (const p of (parts || []).sort((a, b) => a.display_name.localeCompare(b.display_name, 'uk'))) {
    const units = byP[p.id] || [];
    const isMe = p.id === S.me.participant_id;

    if (!units.length) {
      html += `<div class="card tight"><b>${esc(p.display_name)}</b>
        <span class="dim"> — склад закритий до старту турніру</span></div>`;
      continue;
    }
    const counts = {};
    for (const u of units) {
      const k = u.boost_code + '|' + u.status;
      counts[k] = (counts[k] || 0) + 1;
    }
    html += `<div class="card tight">
      <b style="color:${isMe ? 'var(--gold)' : 'var(--purple)'}">${esc(p.display_name)}</b>
      <div class="boost-row" style="margin-top:8px">
        ${Object.entries(counts).map(([k, n]) => {
          const [code, st] = k.split('|');
          const done = st === 'spent';
          return `<span class="boost-chip" style="${done ? 'opacity:0.45;text-decoration:line-through' : ''}">
            ${esc(typeOf(code).title)} ×${n}</span>`;
        }).join('')}
      </div></div>`;
  }
  $('view').innerHTML = html || '<div class="card"><p class="dim">Складів ще немає</p></div>';
}

          <div class="score-in">
            <input type="number" min="0" class="rs-h" inputmode="numeric" value="${m.home_score ?? ''}">
            <span class="sep">:</span>
            <input type="number" min="0" class="rs-a" inputmode="numeric" value="${m.away_score ?? ''}">
          </div>
        </div>`).join('')}
      <button class="primary" id="btn-results" style="margin-top:12px">Зберегти результати</button>
    </div>

    <div class="card">
      <h2>Імпорт матчів</h2>
      <p class="dim" style="margin-bottom:10px">
        По рядку на матч, через тире: <span class="mono">Барселона - Реал Мадрид</span></p>
      <textarea id="imp" rows="8" style="width:100%;background:var(--panel-3);border:1px solid var(--line);
        border-radius:9px;color:var(--text);padding:11px;font-family:'JetBrains Mono',monospace;font-size:13px"></textarea>
      <button class="ghost" id="btn-import" style="margin-top:10px;width:100%">Імпортувати у вікенд</button>
    </div>

    <div class="card">
      <h2>Зсув дедлайну</h2>
      <p class="dim" style="margin-bottom:10px">
        Лише при реальному перенесенні гри. Причина обов'язкова — її бачать усі.</p>
      <input type="datetime-local" id="dl-new" style="width:100%;padding:11px;background:var(--panel-3);
        border:1px solid var(--line);border-radius:9px;color:var(--text);font-size:15px;margin-bottom:8px">
      <input type="text" id="dl-why" placeholder="причина, напр. «матч Барси перенесли на понеділок»"
        style="width:100%;padding:11px;background:var(--panel-3);border:1px solid var(--line);
        border-radius:9px;color:var(--text);font-size:15px">
      <button class="ghost" id="btn-deadline" style="margin-top:10px;width:100%">Зсунути</button>
    </div>

    <div class="card">
      <h2>Відкрити чужий прогноз</h2>
      <p class="dim" style="margin-bottom:10px">
        Аварійний випадок. Кожне відкриття одразу потрапляє в журнал, видимий усім —
        зокрема тому, чий прогноз ти дивишся.</p>
      <select id="ap-who" style="width:100%;padding:11px;background:var(--panel-3);
        border:1px solid var(--line);border-radius:9px;color:var(--text);font-size:15px;margin-bottom:8px">
        <option value="">— обери учасника —</option>
      </select>
      <input type="text" id="ap-why" placeholder="навіщо (піде в журнал)"
        style="width:100%;padding:11px;background:var(--panel-3);border:1px solid var(--line);
        border-radius:9px;color:var(--text);font-size:15px">
      <button class="ghost" id="btn-open" style="margin-top:10px;width:100%">Відкрити із записом у журнал</button>
      <div id="open-result"></div>
    </div>

    <div class="card">
      <h2>Бюджет і прайс</h2>
      <div id="prices"></div>
      <button class="ghost" id="btn-prices" style="margin-top:10px;width:100%">Зберегти</button>
    </div>

    <div class="card">
      <h2>Спецставки</h2>
      <p class="dim" style="margin-bottom:10px">Впиши правильні відповіді — бали порахуються самі.</p>
      <div id="specials"></div>
      <button class="ghost" id="btn-specials" style="margin-top:10px;width:100%">Зберегти підсумки</button>
    </div>`;

  await renderAdminExtras();

  $('view').querySelectorAll('[data-agw]').forEach(b => b.onclick = () => {
    S.gw = S.gameweeks.find(g => g.gameweek_id === b.dataset.agw);
    go('admin');
  });

  $('btn-results').onclick = async () => {
    const results = [];
    $('view').querySelectorAll('[data-am]').forEach(card => {
      const h = card.querySelector('.rs-h').value;
      const a = card.querySelector('.rs-a').value;
      if (h !== '' && a !== '') {
        results.push({ match_id: card.dataset.am, home: Number(h), away: Number(a) });
      }
    });
    if (!results.length) return alert('Нема що зберігати');
    const { error } = await sb.rpc('admin_save_results', {
      p_gameweek: S.gw.gameweek_id, p_results: results
    });
    if (error) return alert('Помилка: ' + error.message);
    alert(`Збережено ${results.length}. Бали перераховано.`);
    go('admin');
  };

  $('btn-import').onclick = async () => {
    const lines = $('imp').value.split('\n').map(s => s.trim()).filter(Boolean);
    const matches = [];
    for (const l of lines) {
      const parts = l.split(/\s+[-–—]\s+/);
      if (parts.length !== 2) return alert('Не розібрав рядок: ' + l);
      matches.push({ home: parts[0].trim(), away: parts[1].trim(), kickoff: null });
    }
    if (!matches.length) return alert('Порожньо');
    const { data, error } = await sb.rpc('admin_import_matches', {
      p_gameweek: S.gw.gameweek_id, p_matches: matches
    });
    if (error) return alert('Помилка: ' + error.message);
    alert(`Додано матчів: ${data}`);
    go('admin');
  };
}

// ---------------------------------------------------------------------
//  Адмінські екрани: дедлайн, доступ до прогнозу, прайс, спецставки
// ---------------------------------------------------------------------
async function renderAdminExtras(){
  // --- U-11: зсув дедлайну
  $('btn-deadline').onclick = async () => {
    const when = $('dl-new').value;
    const why  = $('dl-why').value.trim();
    if (!when) return alert('Вкажи нову дату');
    if (!why)  return alert('Причина обов\'язкова — її бачать усі учасники');
    const { error } = await sb.rpc('admin_shift_deadline', {
      p_gameweek: S.gw.gameweek_id,
      p_new: new Date(when).toISOString(),
      p_reason: why
    });
    if (error) return alert('Помилка: ' + error.message);
    alert('Дедлайн зсунуто, причина показана всім');
    await loadRefs(); go('admin');
  };

  // --- U-17: доступ до чужого прогнозу через журнал
  const { data: parts } = await sb.from('participants').select('*')
    .eq('tournament_id', TOURNAMENT_ID);
  const sel = $('ap-who');
  for (const p of (parts || [])) {
    if (p.id === S.me.participant_id) continue;
    const o = document.createElement('option');
    o.value = p.id; o.textContent = p.display_name;
    sel.appendChild(o);
  }

  $('btn-open').onclick = async () => {
    if (!sel.value) return alert('Обери учасника');
    if (!confirm('Це запишеться в журнал, який бачать усі. Продовжити?')) return;
    const { data, error } = await sb.rpc('admin_open_predictions', {
      p_gameweek: S.gw.gameweek_id,
      p_target: sel.value,
      p_reason: $('ap-why').value.trim() || null
    });
    if (error) return alert('Помилка: ' + error.message);
    $('open-result').innerHTML = `<div class="msg ok" style="margin-top:12px">
      Записано в журнал</div>` + (data || []).map(r =>
      `<div class="rev-line"><span>${esc(r.boost_code || '')}</span>
       <span class="s">${r.home_score ?? '—'}:${r.away_score ?? '—'}</span></div>`).join('');
  };

  // --- U-8c: бюджет і прайс
  const { data: t } = await sb.from('tournaments').select('*').eq('id', TOURNAMENT_ID).single();
  $('prices').innerHTML = `
    <div class="rev-line"><span><b>Бюджет турніру</b></span>
      <input type="number" id="pr-budget" value="${t.budget}" style="width:90px;padding:7px;
        background:var(--panel-3);border:1px solid var(--line);border-radius:7px;
        color:var(--gold);font-family:'JetBrains Mono',monospace;text-align:right;font-weight:700"></div>` +
    S.boostTypes.map(b => `<div class="rev-line"><span>${esc(b.title)}</span>
      <input type="number" data-price="${b.code}" value="${priceOf(b.code)}" style="width:90px;padding:7px;
        background:var(--panel-3);border:1px solid var(--line);border-radius:7px;
        color:var(--text);font-family:'JetBrains Mono',monospace;text-align:right"></div>`).join('');

  $('btn-prices').onclick = async () => {
    const b = Number($('pr-budget').value);
    const { error: e1 } = await sb.from('tournaments').update({ budget: b }).eq('id', TOURNAMENT_ID);
    if (e1) return alert('Помилка: ' + e1.message);
    for (const inp of $('view').querySelectorAll('[data-price]')) {
      await sb.from('boost_prices')
        .update({ price: Number(inp.value) })
        .eq('tournament_id', TOURNAMENT_ID)
        .eq('boost_code', inp.dataset.price);
    }
    alert('Збережено');
    await loadRefs(); go('admin');
  };

  // --- U-15: підсумки спецставок
  const { data: bets } = await sb.from('special_bets').select('*')
    .eq('tournament_id', TOURNAMENT_ID).order('position');

  $('specials').innerHTML = !bets || !bets.length
    ? '<p class="dim">Спецставок у цьому турнірі немає.</p>'
    : bets.map(b => `<div style="margin-bottom:10px">
        <div style="font-size:14px;margin-bottom:5px">${esc(b.question)}</div>
        <input type="text" data-bet="${b.id}" value="${esc(b.correct_answer || '')}"
          placeholder="правильна відповідь" style="width:100%;padding:9px;
          background:var(--panel-3);border:1px solid var(--line);border-radius:8px;
          color:var(--text);font-size:14px"></div>`).join('');

  $('btn-specials').onclick = async () => {
    for (const inp of $('view').querySelectorAll('[data-bet]')) {
      await sb.from('special_bets')
        .update({ correct_answer: inp.value.trim() || null })
        .eq('id', inp.dataset.bet);
    }
    const { error } = await sb.rpc('recalculate_special_bets', { p_tournament: TOURNAMENT_ID });
    if (error) return alert('Помилка: ' + error.message);
    alert('Підсумки збережено, бали перераховано');
  };
}

// =====================================================================
//  Модальне вікно перевірки
// =====================================================================
function showModal(title, body, onConfirm){
  $('modal-host').innerHTML = `
    <div class="modal-bg" id="mbg"><div class="modal">
      <h2>${esc(title)}</h2>
      <div>${body}</div>
      <button class="primary" id="m-ok" style="margin-top:16px">Так, зберігаю</button>
      <button class="ghost" id="m-no" style="margin-top:9px;width:100%">Ще поправлю</button>
    </div></div>`;
  $('m-no').onclick = closeModal;
  $('m-ok').onclick = async () => {
    $('m-ok').disabled = true;
    $('m-ok').textContent = 'зберігаю…';
    try { await onConfirm(); }
    catch (e) {
      alert('Помилка: ' + (e.message || e));
      $('m-ok').disabled = false;
      $('m-ok').textContent = 'Так, зберігаю';
    }
  };
}
function closeModal(){ $('modal-host').innerHTML = ''; }

// =====================================================================
boot();
</script>
</body>
</html>
