<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[BoBet] Клубний ЧС 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0E1410;
    --panel: #151D17;
    --panel-2: #1B251D;
    --line: #2A362B;
    --text: #EDEFE8;
    --text-dim: #8B9A8C;
    --gold: #E8B23C;
    --silver: #C7CDC3;
    --bronze: #C97B4A;
    --green: #4CAE6B;
    --green-deep: #2E7A47;
    --red: #C75C4A;
    --field-line: rgba(237,239,232,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, var(--field-line) 0px, var(--field-line) 1px, transparent 1px, transparent 64px),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:980px;margin:0 auto;padding:0 20px 80px;}

  /* ===== HEADER ===== */
  header{
    padding:48px 0 28px;
    border-bottom:1px solid var(--line);
    margin-bottom:32px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
  }
  .brand-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--green);
    margin:0 0 10px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:38px;
    line-height:1.1;
    margin:0;
    letter-spacing:-0.01em;
  }
  .meta-block{
    text-align:right;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--text-dim);
  }
  #refresh-btn{
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    margin-top:8px;
    transition:border-color .15s;
  }
  #refresh-btn:hover{border-color:var(--green);}
  #refresh-btn:focus-visible{outline:2px solid var(--green); outline-offset:2px;}
  #refresh-btn.spinning{opacity:0.6; cursor:wait;}

  /* ===== TABS ===== */
  nav.tabs{
    display:flex;
    gap:4px;
    margin-bottom:32px;
    overflow-x:auto;
    border-bottom:1px solid var(--line);
  }
  nav.tabs button{
    background:transparent;
    border:none;
    color:var(--text-dim);
    font-family:'Space Grotesk',sans-serif;
    font-size:14px;
    font-weight:500;
    padding:10px 16px;
    cursor:pointer;
    white-space:nowrap;
    border-bottom:2px solid transparent;
    transition:color .15s, border-color .15s;
  }
  nav.tabs button:hover{color:var(--text);}
  nav.tabs button.active{color:var(--green); border-bottom-color:var(--green);}
  nav.tabs button:focus-visible{outline:2px solid var(--green); outline-offset:-2px;}

  section.view{display:none;}
  section.view.active{display:block;}

  /* ===== LEADERBOARD GRID ===== */
  .boards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
  }
  @media(max-width:760px){ .boards{grid-template-columns:1fr;} }
  .board{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  .board-head{
    padding:14px 16px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:14px;
    color:var(--text);
    border-bottom:1px solid var(--line);
    background:var(--panel-2);
  }
  .row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:11px 16px;
    border-bottom:1px solid var(--line);
  }
  .row:last-child{border-bottom:none;}
  .row.podium{background:rgba(76,174,107,0.10);}
  .rank{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    width:28px;
    text-align:center;
    color:var(--text-dim);
    flex-shrink:0;
  }
  .row.podium .rank{color:var(--green); font-weight:700;}
  .rank .crown{font-size:16px;}
  .name{flex:1; font-size:14px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .pts{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:15px;
    color:var(--text);
    flex-shrink:0;
  }
  .row.podium .pts{color:var(--green);}

  /* ===== GENERIC TABLE VIEW ===== */
  .table-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:auto;
    margin-bottom:24px;
  }
  table.sheet-table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
    min-width:480px;
  }
  table.sheet-table th{
    text-align:left;
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--text-dim);
    background:var(--panel-2);
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
    position:sticky;
    top:0;
  }
  table.sheet-table td{
    padding:9px 14px;
    border-bottom:1px solid var(--line);
    color:var(--text);
    white-space:nowrap;
  }
  table.sheet-table tbody tr:last-child td{border-bottom:none;}
  table.sheet-table tbody tr:nth-child(even){background:rgba(255,255,255,0.015);}
  table.sheet-table tbody tr:hover{background:rgba(76,174,107,0.06);}

  .section-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:15px;
    font-weight:500;
    margin:0 0 12px;
    color:var(--text-dim);
  }

  .rules-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:20px 24px;
    font-size:14px;
    line-height:1.8;
  }
  .rules-card p{margin:0 0 10px;}

  .status-line{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--text-dim);
    padding:30px 0;
    text-align:center;
  }
  .status-line.err{color:var(--red);}

  ::-webkit-scrollbar{height:8px; width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <p class="brand-tag">BoBet &middot; Fantasy League</p>
      <h1>Клубний ЧС 2025</h1>
    </div>
    <div class="meta-block">
      <div id="updated-at">Завантаження...</div>
      <button id="refresh-btn">⟳ Оновити дані</button>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>
  <div id="content"></div>

</div>

<script>
const SHEET_ID = '1sO_M9-uaIDls4sy6kP3EZ-kMuXSuYrlgbyScuegRsRQ';

const TABS = [
  { key:'leaderboards', label:'Загальний зачет', sheet:'Leaderboards', kind:'leaderboard' },
  { key:'group',        label:'Група',           sheet:'Group',        kind:'table' },
  { key:'groupPos',     label:'Динаміка груп',    sheet:'Group positions', kind:'table' },
  { key:'playoff',      label:'Плей-офф',         sheet:'Play-off',     kind:'table' },
  { key:'playoffBonus', label:'Бонуси плей-офф',  sheet:'Play-off bonus points', kind:'table' },
  { key:'rules',        label:'Правила і призи',  sheet:'Rules + Prize pool', kind:'rules' },
];

let activeKey = TABS[0].key;
const cache = {};

function buildUrl(sheetName){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
}

async function fetchSheet(sheetName){
  const res = await fetch(buildUrl(sheetName));
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  const match = text.match(/setResponse\(([\s\S]*)\);?\s*$/);
  if(!match) throw new Error('Не вдалося розпарсити відповідь Google Sheets');
  const json = JSON.parse(match[1]);
  if(json.status === 'error'){
    throw new Error((json.errors && json.errors[0] && json.errors[0].detailed_message) || 'Помилка таблиці');
  }
  const cols = json.table.cols.map(c => c.label || c.id || '');
  const rows = json.table.rows.map(r => r.c.map(cell => {
    if(!cell) return '';
    if(cell.f !== undefined && cell.f !== null) return cell.f;
    return cell.v === null || cell.v === undefined ? '' : cell.v;
  }));
  return { cols, rows };
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const CROWNS = ['👑','👑','👑'];

function renderLeaderboard(data){
  // Leaderboards sheet: groups of 3 columns (Number, Name, Points) separated by blank columns,
  // headers in row 0 carry the board title (e.g. Group / Play-off / General).
  const cols = data.cols;
  const rows = data.rows;
  const boards = [];
  let i = 0;
  while(i < cols.length){
    if(cols[i] && cols[i].trim() !== ''){
      const title = cols[i].trim();
      const entries = [];
      for(const r of rows){
        const rank = r[i];
        const name = r[i+1];
        const pts = r[i+2];
        if(name === '' || name === undefined) continue;
        entries.push({
          rank: rank === '' || rank === undefined ? '' : String(rank),
          name: String(name),
          pts: pts === '' || pts === undefined ? '' : pts
        });
      }
      boards.push({ title, entries });
      i += 3;
    } else {
      i += 1;
    }
  }
  if(boards.length === 0) return '<div class="status-line">Немає даних для відображення.</div>';

  return `<div class="boards">${boards.map(b => {
    const isGeneral = /general/i.test(b.title);
    return `
    <div class="board">
      <div class="board-head">${escapeHtml(b.title)}</div>
      ${b.entries.map((e, idx) => `
        <div class="row ${idx < 3 ? 'podium' : ''}">
          <div class="rank">${isGeneral && idx < 3 ? `<span class="crown">${CROWNS[idx]}</span>` : escapeHtml(e.rank)}</div>
          <div class="name">${escapeHtml(e.name)}</div>
          <div class="pts">${escapeHtml(e.pts)}</div>
        </div>
      `).join('')}
    </div>
  `;
  }).join('')}</div>`;
}

function renderGenericTable(data){
  const cols = data.cols;
  const rows = data.rows.filter(r => r.some(v => v !== '' && v !== null && v !== undefined));
  if(rows.length === 0) return '<div class="status-line">Немає даних для відображення.</div>';
  return `
    <div class="table-card">
      <table class="sheet-table">
        <thead><tr>${cols.map(c => `<th>${escapeHtml(c || '')}</th>`).join('')}</tr></thead>
        <tbody>
          ${rows.map(r => `<tr>${r.map(v => `<td>${escapeHtml(v)}</td>`).join('')}</tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderRules(data){
  const lines = data.rows
    .flat()
    .filter(v => v !== '' && v !== null && v !== undefined)
    .map(v => String(v));
  if(lines.length === 0) return '<div class="status-line">Немає даних для відображення.</div>';
  return `<div class="rules-card">${lines.map(l => `<p>${escapeHtml(l)}</p>`).join('')}</div>`;
}

function renderTabContent(tab, data){
  if(tab.kind === 'leaderboard') return renderLeaderboard(data);
  if(tab.kind === 'rules') return renderRules(data);
  return renderGenericTable(data);
}

async function loadTab(key, { force=false } = {}){
  const tab = TABS.find(t => t.key === key);
  const content = document.getElementById('content');
  if(!force && cache[key]){
    content.innerHTML = renderTabContent(tab, cache[key]);
    return;
  }
  content.innerHTML = '<div class="status-line">Завантаження даних з Google Sheets...</div>';
  try{
    const data = await fetchSheet(tab.sheet);
    cache[key] = data;
    content.innerHTML = renderTabContent(tab, data);
  }catch(err){
    content.innerHTML = `<div class="status-line err">Не вдалося завантажити вкладку «${escapeHtml(tab.label)}»: ${escapeHtml(err.message)}</div>`;
  }
}

function setActiveTab(key){
  activeKey = key;
  document.querySelectorAll('nav.tabs button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.key === key);
  });
  loadTab(key);
}

function buildTabs(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = TABS.map(t => `<button data-key="${t.key}">${escapeHtml(t.label)}</button>`).join('');
  nav.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => setActiveTab(btn.dataset.key));
  });
}

function updateTimestamp(){
  const el = document.getElementById('updated-at');
  const now = new Date();
  el.textContent = 'Оновлено: ' + now.toLocaleTimeString('uk-UA', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

async function refreshAll(){
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  btn.disabled = true;
  Object.keys(cache).forEach(k => delete cache[k]);
  await loadTab(activeKey, { force:true });
  updateTimestamp();
  btn.classList.remove('spinning');
  btn.disabled = false;
}

document.getElementById('refresh-btn').addEventListener('click', refreshAll);

buildTabs();
setActiveTab(activeKey);
updateTimestamp();

// auto-refresh every 60s
setInterval(refreshAll, 60000);
</script>
</body>
</html>
