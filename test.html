async function fetchSheet(sheetId, sheetName, gid){
  LIVE_BOOSTS = false;             // архів малюється старими кольорами
  // заморожений архів: віддаємо вшиті дані, мережа не потрібна
  if(typeof FROZEN !== 'undefined' && FROZEN[sheetId]){
    const rows = FROZEN[sheetId][gid] || FROZEN[sheetId][gid || ''];
    if(rows) return { rows };
  }
  const cacheKey = sheetId + '::' + sheetName + '::' + (gid || '');
  if(cache[cacheKey]) return cache[cacheKey];
  const res = await fetch(buildUrl(sheetId, sheetName, gid));
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  const rows = parseCSV(text).map(r => r.map(v => (v === null || v === undefined ? '' : String(v).trim())));
  const data = { rows };
  cache[cacheKey] = data;
  return data;
}

/* ======== HELPERS ======== */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function cellStr(v){ return v === null || v === undefined ? '' : String(v).trim(); }

/* Known participant names across all tournaments — used to reliably locate the
   player header row regardless of surrounding structure. */
const KNOWN_PLAYERS = ['бо','лб','антон','макс','саня','миша','женя','денис','андрей','андрій'];
function isKnownPlayer(name){
  return KNOWN_PLAYERS.includes(cellStr(name).toLowerCase());
}

/* Клітинка вважається "порожньою" для гравця: службові й нульові значення. */
function isBlankCell(v){
  const s = cellStr(v);
  return s === '' || s === '0' || s === '-' || s === '#REF!' ||
         /^points?$/i.test(s) || /^prediction$/i.test(s) || isPlaceholderName(s);
}

/* Таблиці мають дубльовані колонки (двічі «Женя») і колонки учасників, які цей
   турнір не грають (усе порожнє, тотал 0). Прибираємо і те, і те. */
function filterActivePlayers(rows, players, startRow, totals){
  const seen = new Set();
  const kept = [];
  for(const p of players){
    const key = cellStr(p.name).toLowerCase();
    if(seen.has(key)) continue;
    let hasData = false;
    for(let ri = startRow; ri < rows.length && !hasData; ri++){
      if(!isBlankCell(rows[ri][p.col])) hasData = true;
    }
    const tot = totals ? toNum(totals[p.col]) : null;
    if(!hasData && !tot) continue;
    seen.add(key);
    kept.push(p);
  }
  return kept.length >= 2 ? kept : players;
}
// find the row that contains player names and return {rowIdx, players:[{col,name}]}
function findPlayersRow(rows, minCol){
  minCol = minCol || 0;
  for(let ri = 0; ri < rows.length; ri++){
    const cand = [];
    for(let ci = minCol; ci < rows[ri].length; ci++){
      if(isKnownPlayer(rows[ri][ci])) cand.push({ col: ci, name: cellStr(rows[ri][ci]) });
    }
    if(cand.length >= 2) return { rowIdx: ri, players: cand };
  }
  return null;
}
// find the Points totals row: has "Points" label and numbers in player columns
function findTotalsRow(rows, players){
  for(let ri = 0; ri < rows.length; ri++){
    if(rows[ri].some(v => /^points$/i.test(cellStr(v))) &&
       players.some(p => toNum(rows[ri][p.col]) !== null)){
      const t = {};
      players.forEach(p => { const n = toNum(rows[ri][p.col]); if(n !== null) t[p.col] = n; });
      return t;
    }
  }
  return null;
}
function isPlaceholderName(name){
  return /^№\s*\d+$/.test(name.trim());
}
function toNum(v){
  const n = parseFloat(String(v).replace(',', '.'));
  return isNaN(n) ? null : n;
}
function parseScore(s){
  const m = cellStr(s).match(/^(\d+)\s*[:\-–]\s*(\d+)$/);
  if(!m) return null;
  return [Number(m[1]), Number(m[2])];
}
function outcomeSign(pair){
  return pair[0] > pair[1] ? 1 : pair[0] < pair[1] ? -1 : 0;
}
function stageClass(title){
  const t = title.toLowerCase();
  if(t.includes('general')) return 'stage-general';
  if(t.includes('knockout')) return 'stage-knockout';
  if(t.includes('play')) return 'stage-playoff';
  if(t.includes('group')) return 'stage-group';
  return '';
}

/* ======== LEADERBOARDS ======== */
function renderLeaderboard(data){
  const rows = data.rows;
  const nCols = Math.max(0, ...rows.map(r => r.length));

  // Find the header row: the one containing "Name" cells. Each "Name" cell marks a board
  // whose columns are [№ | Name | Points] = [ci-1 | ci | ci+1]. The board title sits in
  // the row(s) above, spanning that block.
  // У таблиці буває кілька блоків «№ | Name | Points»: службові копії без
  // заголовків і справжні борди із заголовком над ними. Збираємо всі рядки-шапки
  // і далі обираємо той, у якого борди підписані.
  const candidates = [];
  for(let ri = 0; ri < rows.length; ri++){
    const cols = [];
    for(let ci = 0; ci < nCols; ci++){
      if(/^name$/i.test(cellStr(rows[ri][ci]))) cols.push(ci);
    }
    if(cols.length) candidates.push({ rowIdx: ri, cols });
  }
  if(candidates.length === 0) return renderGenericTable(data);

  let best = null;
  for(const cand of candidates){
    const built = buildLeaderboardBoards(rows, nCols, cand.rowIdx, cand.cols);
    const titled = built.filter(b => b.title).length;
    if(!best || titled > best.titled || (titled === best.titled && built.length > best.boards.length)){
      best = { titled, boards: built, headerRowIdx: cand.rowIdx };
    }
  }
  const boards = best.boards;
  const headerRowIdx = best.headerRowIdx;

  // Keep only boards that have a real stage title. Hidden helper copies have none.
  const titled = boards.filter(b => b.title);
  let finalBoards;
  if(titled.length >= 1){
    finalBoards = titled;
  } else {
    // Fall back to this tournament's explicit board names.
    const STD = LEADERBOARD_NAMES[activeTournament.key] || ['Group', 'Play-off', 'General'];
    finalBoards = boards.map((b, i) => ({ ...b, title: STD[i] || `Board ${i + 1}` }));
  }
  if(finalBoards.length === 0) return renderGenericTable(data);
  return renderBoards(finalBoards);
}

function buildLeaderboardBoards(rows, nCols, headerRowIdx, nameCols){
  const boards = [];
  for(const nameCol of nameCols){
    const ptsCol = nameCol + 1;
    // title: nearest non-empty text above this board. Merged stage titles in CSV land
    // in the leftmost cell of the merged range, so scan a few columns left of Name too.
    let title = '';
    for(let up = 1; up <= 5 && headerRowIdx - up >= 0 && title === ''; up++){
      for(const tc of [nameCol - 1, nameCol, nameCol - 2, nameCol - 3, ptsCol]){
        if(tc < 0 || tc >= nCols) continue;
        const t = cellStr(rows[headerRowIdx - up][tc]);
        if(t !== '' && !/^(№|#|name|points?)$/i.test(t) && toNum(t) === null && !parseScore(t)){ title = t; break; }
      }
    }
    const entries = [];
    for(let di = headerRowIdx + 1; di < rows.length; di++){
      const name = cellStr(rows[di][nameCol]);
      const pts = toNum(rows[di][ptsCol]);
      if(name === '' || isPlaceholderName(name)) continue;
      if(pts === null) continue;
      entries.push({ name, pts });
    }
    // Учасники, які цей турнір не грають, стоять у таблиці з 0. Ховаємо їх, але
    // лише коли турнір уже стартував (є хоч кілька ненульових результатів).
    const scored = entries.filter(e => e.pts > 0);
    const shown = scored.length >= 3 ? scored : entries;
    if(shown.length) boards.push({ title, entries: shown });
  }
  return boards;
}

function renderBoards(finalBoards){

  return `<div class="boards">${finalBoards.map(b => {
    const sorted = [...b.entries].sort((a, z) => z.pts - a.pts);
    // tie-aware: assign each entry a "place" (1-based). Tied entries share the same place.
    const labels = [];
    const places = []; // best place index for coloring (0-based rank)
    let pos = 1, k = 0;
    while(k < sorted.length){
      let j = k;
      while(j + 1 < sorted.length && sorted[j+1].pts === sorted[k].pts) j++;
      const size = j - k + 1;
      const label = size === 1 ? String(pos) : Array.from({length:size}, (_, q) => pos + q).join('&');
      for(let q = k; q <= j; q++){ labels[q] = label; places[q] = pos - 1; }
      pos += size;
      k = j + 1;
    }
    return `
    <div class="board ${stageClass(b.title)}">
      <div class="board-head">${escapeHtml(b.title)}</div>
      ${sorted.map((e, idx) => {
        const place = places[idx]; // 0=first, 1=second, 2=third (shared across ties)
        const placeCls = place === 0 ? 'p1' : place === 1 ? 'p2' : place === 2 ? 'p3' : '';
        // podium places show ONLY a medal (shared across ties); others show the numeric place
        const rankInner = place < 3
          ? `<span class="crown">${MEDALS[place]}</span>`
          : escapeHtml(labels[idx]);
        return `
        <div class="lb-row ${placeCls}">
          <div class="lb-rank">${rankInner}</div>
          <div class="lb-name">${escapeHtml(e.name)}</div>
          <div class="lb-pts">${e.pts}</div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('')}</div>`;
}

/* ======== POINTS SUMMARY (спільний блок карток над будь-якою вкладкою) ========
   players: [{col,name}], totals: {col: number} або масив чисел у порядку players. */
function renderPointsSummary(players, totals){
  if(!players || !players.length || !totals) return '';
  const val = (p, i) => {
    if(Array.isArray(totals)) return totals[i];
    return totals[p.col];
  };
  if(players.every((p, i) => val(p, i) === undefined || val(p, i) === null || val(p, i) === '')) return '';
  return `
    <div class="gp-summary">
      ${players.map((p, i) => {
        const v = val(p, i);
        return `
        <div class="gp-summary-cell">
          <span class="gp-summary-name">${escapeHtml(p.name)}</span>
          <span class="gp-summary-pts">${escapeHtml(v === undefined || v === null || v === '' ? '0' : String(v))}</span>
        </div>`;
      }).join('')}
    </div>`;
}

/* ======== MATCHES ======== */
const GROUP_PALETTE = ['#E8944A','#9AA5A8','#A98FDB','#5FB3B3','#7CC47F','#D9C79A','#D07777','#5E97D0'];

function isDateLike(s){
  return /\d{1,2}\.\d{1,2}(\.\d{2,4})?/.test(s);
}

function findMatchesLayout(rows){
  for(let ri = 0; ri < Math.min(rows.length, 12); ri++){
    const r = rows[ri];
    let dateCol = -1, gameCol = -1, resCol = -1;
    r.forEach((v, ci) => {
      const s = cellStr(v).toLowerCase();
      if(s === 'date' && dateCol === -1) dateCol = ci;
      if((s === 'game' || s === 'match') && gameCol === -1) gameCol = ci;
      if((s === 'result' || s === 'score') && resCol === -1) resCol = ci;
    });
    // Game + Result are required; Date is optional (Knockout tabs may omit it)
    if(gameCol !== -1 && resCol !== -1){
      // If no explicit "Date" header found, check the column to the left of Game:
      // if body rows there hold date-like values, it's the date column.
      if(dateCol === -1 && gameCol - 1 >= 0){
        let dateHits = 0;
        for(let bi = ri + 1; bi < Math.min(rows.length, ri + 12); bi++){
          if(isDateLike(cellStr(rows[bi][gameCol - 1]))) dateHits++;
        }
        if(dateHits >= 1) dateCol = gameCol - 1;
      }
      // Locate players reliably by known names (works for both old and new layouts).
      let players = [];
      const pr = findPlayersRow(rows, resCol + 1);
      if(pr) players = pr.players;
      // fallback: any text cells to the right of Result on the header row
      if(players.length === 0){
        for(let ci = resCol + 1; ci < r.length; ci++){
          const name = cellStr(r[ci]);
          if(name !== '' && !isPlaceholderName(name) && toNum(name) === null){
            players.push({ col: ci, name });
          }
        }
      }
      if(players.length === 0) return null;
      // totals: спершу шукаємо рядок з підписом "Points"…
      let totals = findTotalsRow(rows, players);
      // …а якщо підпису немає (Group / Play-off / Knockout: числа просто стоять
      // у рядку над іменами) — беремо найближчий рядок вище з числами в колонках гравців.
      if(!totals){
        const namesRow = pr ? pr.rowIdx : ri;
        for(let up = namesRow - 1; up >= 0 && !totals; up--){
          const t = {};
          let hits = 0;
          players.forEach(p => {
            const n = toNum(rows[up][p.col]);
            if(n !== null){ t[p.col] = n; hits++; }
          });
          if(hits >= 2) totals = t;
        }
      }
      // прибираємо дублі імен і колонки без даних (Денис/Андрій/друга «Женя»)
      players = filterActivePlayers(rows, players, (pr ? pr.rowIdx : ri) + 1, totals);
      return { headerRow: ri, dateCol, gameCol, resCol, players, totals };
    }
  }
  return null;
}

/* Group compositions block (Group A ... Group F with team lists) */
function extractGroupsBlock(rows, headerRow, minCol, maxCol){
  const groups = [];
  const seen = new Set();
  const searchLimit = Math.max(0, headerRow - 1);
  for(let ri = 0; ri < searchLimit; ri++){
    const r = rows[ri];
    for(let ci = 0; ci <= Math.min(r.length - 1, maxCol); ci++){
      const v = cellStr(r[ci]);
      if(/^group\s+\S+$/i.test(v)){
        const key = v.toLowerCase();
        if(seen.has(key)) continue; // hidden duplicates repeat the same titles
        const teams = [];
        for(let di = ri + 1; di < headerRow; di++){
          const t = cellStr(rows[di][ci]);
          if(t === '' || toNum(t) !== null || /^points?$/i.test(t)) break;
          teams.push(t);
        }
        if(teams.length){
          seen.add(key);
          groups.push({ title: v, teams });
        }
      }
    }
    if(groups.length) break; // group titles all live on one row
  }
  return groups;
}

function renderGroupsBlock(groups){
  if(!groups.length) return '';
  return `<div class="groups-grid">${groups.map((g, i) => {
    const color = GROUP_PALETTE[i % GROUP_PALETTE.length];
    return `
    <div class="group-card">
      <div class="g-head" style="color:${color}; box-shadow:inset 0 3px 0 ${color};">${escapeHtml(g.title)}</div>
      ${g.teams.map(t => `<div class="g-team">${withFlag(t)}</div>`).join('')}
    </div>`;
  }).join('')}</div>`;
}

/* ======== BOOSTS (2х / 3х / Double prediction / Overtime) ========
   Внизу аркуша Play-off / Knockout лежить блок:
   [ | Boosts (only 1/8, 1/4,1/2) | ... ]
   [ | | 2х | <матч Бо> | <матч Лб> | ... ]
   Підпис буста — остання непорожня клітинка ліворуч від колонок гравців. */
function findBoostsRow(rows, headerRow, players){
  const firstPCol = Math.min(...players.map(p => p.col));
  for(let ri = headerRow + 1; ri < rows.length; ri++){
    for(let ci = 0; ci < firstPCol; ci++){
      if(/^boosts\b/i.test(cellStr(rows[ri][ci]))) return ri;
    }
  }
  return -1;
}

function extractBoosts(rows, startRow, players){
  if(startRow === -1) return null;
  const firstPCol = Math.min(...players.map(p => p.col));
  let title = '';
  for(let ci = 0; ci < firstPCol; ci++){
    const v = cellStr(rows[startRow][ci]);
    if(/^boosts\b/i.test(v)){ title = v; break; }
  }
  const items = [];
  for(let ri = startRow + 1; ri < rows.length; ri++){
    let label = '';
    for(let ci = firstPCol - 1; ci >= 0; ci--){
      const v = cellStr(rows[ri][ci]);
      if(v !== ''){ label = v; break; }
    }
    const vals = players.map(p => cellStr(rows[ri][p.col]));
    if(label === '' && vals.every(v => v === '')) continue;
    if(label === '') continue;
    items.push({ label, vals });
  }
  return items.length ? { title: title || 'Boosts', items } : null;
}

function renderBoostsBlock(boosts, players, predMap){
  if(!boosts) return '';
  predMap = predMap || {};
  return `
  <div class="table-card boosts-card">
    <table class="sheet-table boosts">
      ${colGroup([14], players.length)}
      <thead>
        <tr>
          <th class="boost-head">${escapeHtml(boosts.title)}</th>
          ${players.map(p => `<th class="boost-player">${escapeHtml(p.name)}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${boosts.items.map(it => `
          <tr>
            <td class="boost-label ${boostKind(it.label)}">${escapeHtml(it.label)}</td>
            ${it.vals.map((v, i) => {
              const lines = cellStr(v).split(/\r?\n/).map(cellStr).filter(Boolean);
              if(!lines.length) return '<td class="boost-val">—</td>';
              const game = lines[0];
              const scores = lines.slice(1).join(' ').split('/').map(cellStr).filter(Boolean);
              // жирним — той рахунок, який реально стоїть у таблиці матчів
              const counted = cellStr(predMap[players[i].col + '|' + normGame(game)]);
              const scoreHtml = scores.length
                ? `<span class="boost-scores">${scores.map(sc =>
                    counted && sc === counted ? `<b>${escapeHtml(sc)}</b>` : escapeHtml(sc)).join(' / ')}</span>`
                : '';
              return `<td class="boost-val">${gameWithFlags(game)}${scoreHtml}</td>`;
            }).join('')}
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

/* Прапорець джерела. Ставиться в точках входу: fetchSupabaseTab —
   живий EuroSeason, fetchSheet — архів. Потрібен тому, що підписи
   бустів у архіві й у EuroSeason частково однакові («2х», «Double
   Predict»), і за текстом їх не розрізнити. Архів має лишитись
   у старих кольорах із Google Sheets, EuroSeason — у нових. */
let LIVE_BOOSTS = false;

/* Тип буста за підписом.
   Архів дає людський підпис із Google Sheets, EuroSeason — назву
   або код із Supabase, тому ловимо і те, і те. Порядок перевірок
   має значення: «3x» шукаємо раніше за «total 3.5», інакше тройка
   з тоталу зловиться першою. */
function boostKind(label){
  const s = cellStr(label).toLowerCase();
  let k;
  if(/double|dp\b/.test(s))                       k = 'bdp';
  else if(/goal_diff|різниц|разниц/.test(s))      k = 'bgd';
  else if(/autopilot|автопілот|автопилот/.test(s))k = 'bap';
  else if(/btts|обидв|обе\s|both/.test(s))        k = 'bbt';
  else if(/^3\s*[хx]|\bx3\b/.test(s))             k = 'b3x';
  else if(/^2\s*[хx]|\bx2\b/.test(s))             k = 'b2x';
  else if(/total|тотал|3\.5/.test(s))             k = 'btot';
  else if(/overtime|овертайм|додатков/.test(s))   k = 'bot';
  else                                            k = 'bgen';

  if(!LIVE_BOOSTS) {
    // В архіві є лише п'ять класів; чого нема — в запасний.
    return ['b2x','b3x','bdp','bot','bgen'].includes(k) ? k : 'bgen';
  }
  // EuroSeason: свій набір, овертайму тут не буває
  return k === 'bot' || k === 'bgen' ? 'bgen' : 'l' + k;
}

/* Нормалізація назви матчу, щоб «Франція - Швеція » з блоку бустів збіглася
   з «Франція - Швеція» у таблиці матчів. */
function normGame(s){
  return cellStr(s).toLowerCase().replace(/[–—]/g, '-').replace(/\s*-\s*/g, '-').replace(/\s+/g, ' ').trim();
}

/* key: "<колонка гравця>|<матч>" -> { kind, label, scores:[...] } */
function buildBoostMap(boosts, players){
  const map = {};
  if(!boosts) return map;
  for(const item of boosts.items){
    const kind = boostKind(item.label);
    item.vals.forEach((val, i) => {
      const lines = cellStr(val).split(/\r?\n/).map(cellStr).filter(Boolean);
      if(!lines.length) return;
      const game = lines[0];
      const scores = [];
      lines.slice(1).join(' ').split('/').forEach(part => {
        const p = cellStr(part);
        if(parseScore(p)) scores.push(p);
      });
      map[players[i].col + '|' + normGame(game)] = { kind, label: item.label, scores };
    });
  }
  return map;
}

/* Рівномірна сітка колонок: службові колонки мають фіксовану частку, всі
   колонки гравців — однакову. Без цього довші імена (Антон, Андрей) розтягують
   свою колонку більше за решту. */
function colGroup(metaWidths, playerCount){
  const meta = metaWidths.reduce((a, b) => a + b, 0);
  const per = playerCount ? Math.min(11, (100 - meta) / playerCount) : 0;
  const used = meta + per * playerCount;
  // залишок віддаємо першій «широкій» колонці (Game / Question)
  const extra = 100 - used;
  const extraIdx = Math.max(0, metaWidths.length - 2);
  return `<colgroup>${metaWidths.map((w, i) =>
      `<col style="width:${(i === extraIdx ? w + extra : w).toFixed(2)}%">`).join('')
    }${Array.from({length: playerCount}, () => `<col style="width:${per.toFixed(2)}%">`).join('')}</colgroup>`;
}

function renderMatches(data){
  const rows = data.rows;
  const layout = findMatchesLayout(rows);
  if(!layout) return null;
  const { headerRow, dateCol, gameCol, resCol, players } = layout;
  let totals = layout.totals;

  // Блок бустів іде окремо в кінці аркуша — виносимо його з таблиці матчів.
  const boostsStart = findBoostsRow(rows, headerRow, players);

  const body = [];
  const predMap = {};
  let lastDate = '';
  let filledDate = '';   // last non-empty, date-like value seen (for merge forward-fill)
  let dayIndex = 0;
  const bodyEnd = boostsStart === -1 ? rows.length : boostsStart;
  for(let ri = headerRow + 1; ri < bodyEnd; ri++){
    const r = rows[ri];
    const game = cellStr(r[gameCol]);
    const rawDate = cellStr(r[dateCol]);
    const preds = players.map(p => cellStr(r[p.col]));

    // рядок тоталів («Points | | | 12 | 10 | …») — не стадія і не матч
    if(/^points?$/i.test(rawDate) || /^points?$/i.test(game)) continue;

    if(game === ''){
      // stage separator (merged "1/8", "Semifinals", "Final" lands in the date column)
      if(rawDate !== '' && !isDateLike(rawDate)){
        // this row may carry the totals (Play-off layout)
        if(!totals){
          const t = {};
          let any = false;
          players.forEach((p, pi) => {
            const n = toNum(preds[pi]);
            if(n !== null){ t[p.col] = n; any = true; }
          });
          if(any) totals = t;
        }
        body.push({ sep: true, label: rawDate });
      }
      continue;
    }
    // a stage label can also land in the game column
    if(cellStr(r[resCol]) === '' && !isDateLike(rawDate) && rawDate === '' && preds.every(v => v === '' || toNum(v) !== null) && !parseScore(game) && preds.some(v => toNum(v) !== null)){
      if(!totals){
        const t = {};
        players.forEach((p, pi) => {
          const n = toNum(preds[pi]);
          if(n !== null) t[p.col] = n;
        });
        totals = t;
      }
      body.push({ sep: true, label: game });
      continue;
    }
    // рядок-стадія, у якого підпис лежить у колонці Game, а прогнози порожні
    // ("1/8", "1/4", "Фінал" у старих турнірах)
    if(cellStr(r[resCol]) === '' && !parseScore(game) && !splitGame(game) && preds.every(v => v === '') &&
       (rawDate === '' || !isDateLike(rawDate)) && game.length <= 40){
      body.push({ sep: true, label: game });
      continue;
    }

    // forward-fill so every match row carries its date.
    if(rawDate !== '' && isDateLike(rawDate)) filledDate = rawDate;
    const dateVal = filledDate;
    const isDayStart = dateVal !== '' && dateVal !== lastDate;
    if(isDayStart){ lastDate = dateVal; dayIndex++; }
    body.push({ date: dateVal, isDayStart, dayIndex, game, result: cellStr(r[resCol]), preds });
    players.forEach((p, pi) => {
      if(preds[pi] !== '') predMap[p.col + '|' + normGame(game)] = preds[pi];
    });
  }
  if(body.filter(b => !b.sep).length === 0) return null;

  const groups = extractGroupsBlock(rows, headerRow, Math.min(...players.map(p => p.col)), Math.max(...players.map(p => p.col)));
  const boosts = extractBoosts(rows, boostsStart, players);
  const boostMap = buildBoostMap(boosts, players);
  const usedKinds = [...new Set(Object.values(boostMap).map(b => b.kind + '\u0000' + b.label))]
    .map(s => ({ kind: s.split('\u0000')[0], label: s.split('\u0000')[1] }));
  const hasDate = dateCol !== -1;
  const nCols = (hasDate ? 3 : 2) + players.length;

  return `
  ${renderPointsSummary(players, totals)}
  ${renderGroupsBlock(groups)}
  <div class="matches-card">
    <table class="matches">
      ${colGroup(hasDate ? [9, 26, 9] : [26, 9], players.length)}
      <thead>
        <tr>
          ${hasDate ? '<th class="meta">Date</th>' : ''}
          <th class="meta th-game">Game</th>
          <th class="meta th-result" style="text-align:center;">Result</th>
          ${players.map(p => `<th class="p-name-cell">${escapeHtml(p.name)}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${body.map(row => {
          if(row.sep){
            return `<tr class="sep-row"><td colspan="${nCols}">${escapeHtml(row.label)}</td></tr>`;
          }
          const resPair = parseScore(row.result);
          return `
          <tr class="${row.isDayStart ? 'day-start' : ''} ${row.dayIndex % 2 === 0 ? 'day-even' : ''}">
            ${hasDate ? `<td class="c-date">${escapeHtml(row.date)}</td>` : ''}
            <td class="c-game">${gameWithFlags(row.game)}</td>
            <td class="c-result">${row.result ? `<span class="result-pill">${escapeHtml(row.result)}</span>` : '—'}</td>
            ${row.preds.map((pv, pi) => {
              const pPair = parseScore(pv);
              const boost = boostMap[players[pi].col + '|' + normGame(row.game)];
              // Double prediction: у блоці бустів лежать обидва рахунки, у таблиці — зарахований.
              const alt = boost && boost.scores.length > 1
                ? boost.scores.find(s => parseScore(s) && cellStr(s) !== cellStr(pv))
                : null;
              const altPair = alt ? parseScore(alt) : null;
              const hit = p => resPair && p && p[0] === resPair[0] && p[1] === resPair[1];
              const exact = hit(pPair) || hit(altPair);
              // вгаданий лише результат (перемога/нічия/поразка) — 1 бал
              const sameSide = p => resPair && p && outcomeSign(p) === outcomeSign(resPair);
              const outcome = !exact && (sameSide(pPair) || sameSide(altPair));
              const cls = ['pred', exact ? 'exact' : '', outcome ? 'outcome' : '',
                           boost ? 'boosted ' + boost.kind : ''].filter(Boolean).join(' ');
              const tip = boost ? ` title="${escapeHtml(boost.label)}"` : '';

              // Double Predict. Доки результату немає, жоден із двох
              // рахунків не головний — показуємо їх однаково. Щойно
              // результат внесено, нагору йде той, що приніс більше:
              // точний рахунок > вгаданий результат > нічого.
              // Раніше нагорі завжди стояв перший введений, навіть
              // якщо зарахувався другий.
              let main = pv, second = alt;
              if(alt && resPair){
                const rank = p => hit(p) ? 2 : (sameSide(p) ? 1 : 0);
                if(rank(altPair) > rank(pPair)){ main = alt; second = pv; }
              }
              const dpEven = !!alt && !resPair;
              const altHtml = second
                ? `<span class="dp-alt${dpEven ? ' dp-even' : ''}">${escapeHtml(second)}</span>`
                : '';
              return `<td class="${cls}"${tip}>${escapeHtml(main || '—')}${altHtml}</td>`;
            }).join('')}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>
  <div class="legend">
    <span><span class="chip exact"></span> вгаданий точний рахунок</span>
    <span><span class="chip outcome"></span> вгаданий результат</span>
    ${usedKinds.map(k => `<span><span class="chip ${k.kind}"></span> ${escapeHtml(k.label)}</span>`).join('')}
  </div>
  ${renderBoostsBlock(boosts, players, predMap)}`;
}

/* ======== GROUP POSITIONS ========
   Layout per group block:
   [Group X | Final positions |  | P1 | P2 | ... ]  <- header-ish
   [team    | actualTeam      |  | predTeam | ...  ]  x4 teams
   Groups stacked vertically, separated by a "-" spacer row.
   A trailing "Points" row holds each player's score. */
function renderGroupPositions(data){
  const rows = data.rows.map(r => r.map(cellStr));
  const nCols = Math.max(0, ...rows.map(r => r.length));

  // "Final result" column — holds the actual final standings.
  let fpCol = -1;
  for(let ri = 0; ri < rows.length; ri++){
    const ci = rows[ri].findIndex(v => /^final (result|positions?)$/i.test(v));
    if(ci !== -1){ fpCol = ci; break; }
  }
  if(fpCol === -1) return null;

  // "Group X" title column (the seeded/composition column). Confirmed structure:
  // col0 = seed list + "Group X" title, then a spacer, fpCol = Final result, spacer, players.
  let seedCol = -1;
  for(let ri = 0; ri < rows.length && seedCol === -1; ri++){
    for(let ci = 0; ci < fpCol; ci++){
      if(/^group\s+\S+/i.test(cellStr(rows[ri][ci]))){ seedCol = ci; break; }
    }
  }
  if(seedCol === -1) seedCol = 0;

  // Players row: reliably located by known participant names (to the right of Final result).
  const pr = findPlayersRow(rows, fpCol + 1);
  if(!pr) return null;
  const players = filterActivePlayers(rows, pr.players, pr.rowIdx + 1, null);
  const totalsRow = findTotalsRow(rows, players);

  // build points summary (player -> total)
  let pointsRow = null;
  if(totalsRow){
    pointsRow = players.map(p => totalsRow[p.col] !== undefined ? String(totalsRow[p.col]) : '0');
  }

  // walk rows building group blocks
  const blocks = [];
  let cur = null;
  for(let ri = 0; ri < rows.length; ri++){
    const r = rows[ri];
    const gcell = cellStr(r[seedCol]);
    const fpHeader = /^final (result|positions?)$/i.test(cellStr(r[fpCol]));

    if(/^group\s+\S+/i.test(gcell) && fpHeader){
      if(cur && cur.teams.length) blocks.push(cur);
      cur = { title: gcell, teams: [] };
      continue;
    }
    if(cur){
      const seed = cellStr(r[seedCol]);          // composition (col 0)
      const actual = cellStr(r[fpCol]);          // final standing
      const preds = players.map(p => cellStr(r[p.col]));
      if(actual !== '' && actual !== '-'){
        cur.teams.push({ seed, actual, preds });
      } else if(seed === '' && actual === '' && preds.every(v => v === '')){
        if(cur.teams.length){ blocks.push(cur); cur = null; }
      }
    }
  }
  if(cur && cur.teams.length) blocks.push(cur);
  if(blocks.length === 0) return null;

  const body = blocks.map(b => `
    <div class="gp-block">
      <div class="gp-head">
        <span class="gp-title">${escapeHtml(b.title)}</span>
      </div>
      <table class="gp-table">
        <thead>
          <tr>
            <th>#</th>
            <th class="gp-seed-h">Склад</th>
            <th class="gp-actual-h">Final result</th>
            ${players.map(p => `<th class="gp-player">${escapeHtml(p.name)}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${b.teams.map((t, i) => `
            <tr>
              <td class="gp-rank">${i + 1}</td>
              <td class="gp-seed">${t.seed ? withFlag(t.seed) : ''}</td>
              <td class="gp-actualteam"><span class="result-pill">${withFlag(t.actual)}</span></td>
              ${t.preds.map(pv => {
                const correct = pv !== '' && pv === t.actual;
                return `<td class="gp-pred ${correct ? 'hit' : ''}">${withFlag(pv)}</td>`;
              }).join('')}
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`).join('');

  // Points summary on TOP (like the totals badges in other tabs)
  const pointsHeader = pointsRow ? `
    <div class="gp-summary">
      ${players.map((p, i) => `
        <div class="gp-summary-cell">
          <span class="gp-summary-name">${escapeHtml(p.name)}</span>
          <span class="gp-summary-pts">${escapeHtml(pointsRow[i] || '0')}</span>
        </div>`).join('')}
    </div>` : '';

  return `${pointsHeader}<div class="gp-wrap">${body}</div>
  <div class="legend"><span><span class="chip exact"></span> correct position</span></div>`;
}

/* ======== PAIR WINNERS (Knockout phase play-offs winners) ========
   Layout: row1 = Points + totals, row2 = "Pair | Pair winner | Бо | Лб | ...",
   then rows = "Брест/ПСЖ | Псж(actual) | Псж | Псж | ...".
   Highlight a player's pick green when it equals the actual pair winner. */
function renderPairWinners(data){
  const rows = data.rows.map(r => r.map(cellStr));

  let headerRow = -1, pairCol = -1, winnerCol = -1;
  for(let ri = 0; ri < rows.length; ri++){
    const wi = rows[ri].findIndex(v => /^pair winner$/i.test(v));
    if(wi !== -1){
      headerRow = ri;
      winnerCol = wi;
      const pi = rows[ri].findIndex(v => /^pair$/i.test(v));
      pairCol = pi !== -1 ? pi : 0;
      break;
    }
  }
  if(headerRow === -1) return null;

  const prPW = findPlayersRow(rows, winnerCol + 1);
  const players = prPW ? filterActivePlayers(rows, prPW.players, prPW.rowIdx + 1, null) : [];
  if(players.length === 0) return null;

  let totals = null;
  for(let ri = 0; ri < rows.length; ri++){
    if(rows[ri].some(v => /^points$/i.test(v)) && players.some(p => toNum(rows[ri][p.col]) !== null)){
      totals = {};
      players.forEach(p => { const n = toNum(rows[ri][p.col]); if(n !== null) totals[p.col] = n; });
      break;
    }
  }
  // фолбек: рядок з числами над іменами, без підпису "Points"
  if(!totals){
    for(let up = prPW.rowIdx - 1; up >= 0 && !totals; up--){
      const t = {};
      let hits = 0;
      players.forEach(p => { const n = toNum(rows[up][p.col]); if(n !== null){ t[p.col] = n; hits++; } });
      if(hits >= 2) totals = t;
    }
  }

  const items = [];
  for(let ri = headerRow + 1; ri < rows.length; ri++){
    const r = rows[ri];
    const pair = cellStr(r[pairCol]);
    const actual = cellStr(r[winnerCol]);
    if(pair === '' && actual === '') continue;
    if(/^points$/i.test(pair)) continue;
    items.push({ pair, actual, picks: players.map(p => cellStr(r[p.col])) });
  }
  if(items.length === 0) return null;

  return `
  ${renderPointsSummary(players, totals)}
  <div class="table-card">
    <table class="matches">
      ${colGroup([24, 12], players.length)}
      <thead>
        <tr>
          <th class="meta">Pair</th>
          <th class="meta th-result">Winner</th>
          ${players.map(p => `<th class="p-name-cell">${escapeHtml(p.name)}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${items.map(it => `
          <tr>
            <td class="c-game">${gameWithFlags(it.pair)}</td>
            <td class="c-result">${it.actual ? `<span class="result-pill">${withFlag(it.actual)}</span>` : '—'}</td>
            ${it.picks.map(pick => {
              const correct = pick !== '' && it.actual !== '' && pick.toLowerCase() === it.actual.toLowerCase();
              return `<td class="pred ${correct ? 'exact' : ''}">${pick ? withFlag(pick) : '—'}</td>`;
            }).join('')}
          </tr>`).join('')}
      </tbody>
    </table>
  </div>
  <div class="legend"><span><span class="chip exact"></span> вгаданий переможець пари</span></div>`;
}

/* ======== SPECIAL BETS (1&2place + ... tabs) ========
   Layout (screenshot-confirmed):
   [Question | Final Result | (marker) | Бо | Лб | ...]   header row
   [1 place  | Іспанія      | Prediction | Франція | ...]  a bet's predictions
   [         |              | Points     | 0 | 4 | ...]    that bet's points
   [Mudryk   | -            | Prediction | 1 | 2 | ...]     numeric bets: Final Result "-"
   [         |              | Points     | 0 | 0 | ...]
   A player's prediction is highlighted green when it matches the Final Result
   (text bets), or — when Final Result is "-" — when that player's Points > 0. */
function renderSpecialBets(data){
  const rows = data.rows.map(r => r.map(cellStr));

  // marker column: the one containing "Prediction" / "Points" labels
  let markerCol = -1;
  for(const r of rows){
    for(let ci = 0; ci < r.length; ci++){
      if(/^prediction$/i.test(r[ci])){ markerCol = ci; break; }
    }
    if(markerCol !== -1) break;
  }
  if(markerCol === -1) return null;

  // player header row: reliably located by known participant names (right of marker)
  const pr = findPlayersRow(rows, markerCol + 1);
  if(!pr) return null;
  const playersRowIdx = pr.rowIdx;
  const players = filterActivePlayers(rows, pr.players, pr.rowIdx + 1, null);

  // Build bets: each bet couples a Prediction row with the following Points row.
  const bets = [];
  let carryLabel = '';
  let cur = null;
  for(let ri = playersRowIdx + 1; ri < rows.length; ri++){
    const r = rows[ri];
    const marker = cellStr(r[markerCol]);
    if(/^prediction$/i.test(marker)){
      // flush a dangling prediction with no points row
      if(cur) bets.push(cur);
      let label = '';
      for(let ci = 0; ci < markerCol - 1; ci++){
        if(cellStr(r[ci]) !== ''){ label = cellStr(r[ci]); break; }
      }
      if(label !== '') carryLabel = label;
      const actual = markerCol - 1 >= 0 ? cellStr(r[markerCol - 1]) : '';
      cur = {
        label: label || carryLabel,
        actual,
        preds: players.map(p => cellStr(r[p.col])),
        points: players.map(() => '')
      };
    } else if(/^points?$/i.test(marker)){
      if(cur){
        cur.points = players.map(p => cellStr(r[p.col]));
        bets.push(cur);
        cur = null;
      }
    }
  }
  if(cur) bets.push(cur);
  if(bets.length === 0) return null;

  // decide green highlight per player for a bet
  function isHit(bet, i){
    const pred = cellStr(bet.preds[i]);
    if(pred === '' || pred === '-') return false;
    const actual = cellStr(bet.actual);
    if(actual !== '' && actual !== '-'){
      return pred.toLowerCase() === actual.toLowerCase();  // text bet: match Final Result
    }
    const pts = toNum(bet.points[i]);                       // numeric bet: scored points
    return pts !== null && pts > 0;
  }

  // загальні Points = сума всіх Points-рядків по кожному гравцю
  const grandTotals = players.map((p, i) =>
    bets.reduce((acc, b) => { const n = toNum(b.points[i]); return acc + (n === null ? 0 : n); }, 0));

  return `
  ${renderPointsSummary(players, grandTotals)}
  <div class="table-card">
    <table class="sheet-table special">
      ${colGroup([20, 17], players.length)}
      <thead>
        <tr>
          <th class="sb-th">Question</th>
          <th class="sb-th sb-th-actual" style="text-align:center;">Final Result</th>
          ${players.map(p => `<th class="sb-th-player">${escapeHtml(p.name)}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${bets.map(bet => {
          const predRow = `<tr>
            <td class="sb-label">${escapeHtml(bet.label)}</td>
            <td class="sb-actual">${bet.actual && bet.actual !== '-' ? `<span class="result-pill">${withFlag(bet.actual)}</span>` : '<span style="color:var(--text-dim);">—</span>'}</td>
            ${bet.preds.map((v, i) => {
              const hit = isHit(bet, i);
              return `<td class="sb-val ${hit ? 'sb-hit' : ''}">${v ? withFlag(v) : '—'}</td>`;
            }).join('')}
          </tr>`;
          const pointsRow = `<tr class="sb-points">
            <td class="sb-label">Points</td>
            <td></td>
            ${bet.points.map(v => {
              const n = toNum(v);
              return `<td class="sb-val ${n !== null && n > 0 ? 'scored' : ''}">${escapeHtml(v || '—')}</td>`;
            }).join('')}
          </tr>`;
          return predRow + pointsRow;
        }).join('')}
      </tbody>
    </table>
  </div>
  <div class="legend"><span><span class="chip exact"></span> вгаданий прогноз</span></div>`;
}

/* ======== GENERIC TABLE ======== */
function renderGenericTable(data){
  let rows = data.rows.map(r => r.map(cellStr));

  rows = rows.filter(r => r.some(v => v !== ''));
  rows = rows.filter(r => {
    const filled = r.filter(v => v !== '');
    if(filled.length === 0) return false;
    return !filled.every(v => v === '0' || isPlaceholderName(v));
  });

  if(rows.length === 0) return '<div class="status-line">Немає даних для відображення.</div>';

  const colCount = Math.max(...rows.map(r => r.length));
  const keepCols = [];
  for(let ci = 0; ci < colCount; ci++){
    const vals = rows.map(r => cellStr(r[ci])).filter(v => v !== '');
    if(vals.length === 0) continue; // fully empty column
    // junk column: every value is 0 / №N placeholder (hidden helper columns)
    const junk = vals.every(v => v === '0' || isPlaceholderName(v));
    if(!junk) keepCols.push(ci);
  }
  rows = rows.map(r => keepCols.map(ci => cellStr(r[ci])));

  const headerRow = rows[0];
  const bodyRows = rows.slice(1);

  // detect a "Points" column (header cell equals Points/Очки) to gold-highlight it
  const pointsColIdx = headerRow.findIndex(c => /^(points?|очк[иі]|бали?)$/i.test(cellStr(c)));

  return `
    <div class="table-card">
      <table class="sheet-table">
        <thead><tr>${headerRow.map((c, ci) =>
          `<th class="${ci === pointsColIdx ? 'th-points' : ''}">${escapeHtml(c)}</th>`
        ).join('')}</tr></thead>
        <tbody>
          ${bodyRows.map(r => `<tr>${headerRow.map((_, ci) =>
            `<td class="${ci === pointsColIdx ? 'td-points' : ''}">${escapeHtml(r[ci] ?? '')}</td>`
          ).join('')}</tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

/* ======== RULES + PRIZE POOL ======== */
function renderRules(data){
  const raw = data.rows.map(r => r.map(cellStr));

  // find the "Condition" header row
  let condRowIdx = -1, condCol = -1;
  for(let ri = 0; ri < raw.length; ri++){
    const ci = raw[ri].findIndex(v => /^condition$/i.test(v));
    if(ci !== -1){ condRowIdx = ri; condCol = ci; break; }
  }
  if(condRowIdx === -1) return renderGenericTable(data);

  // table ends at first fully-empty row (Prize pool block follows — dropped)
  let endIdx = raw.length;
  for(let ri = condRowIdx + 2; ri < raw.length; ri++){
    if(raw[ri].every(v => v === '')){ endIdx = ri; break; }
    if(raw[ri].some(v => /^(призові|prize pool)$/i.test(v))){ endIdx = ri; break; }
    // примітка внизу: довгий текст в колонці Condition без очок і без yes/no
    const cond = cellStr(raw[ri][condCol]);
    const rest = raw[ri].filter((v, ci) => ci !== condCol && cellStr(v) !== '');
    if(cond.length > 60 && rest.length === 0){ endIdx = ri; break; }
  }

  const h1 = raw[condRowIdx];
  const h2 = raw[condRowIdx + 1] || [];
  const bodyRows = raw.slice(condRowIdx + 2, endIdx).filter(r => r.some(v => v !== ''));

  let pointsCol = h1.findIndex(v => /^points?$/i.test(v));
  if(pointsCol === -1){
    // підпис міг загубитись — шукаємо першу колонку праворуч від Condition,
    // де в тілі таблиці стоять числа, а не yes/no
    for(let ci = condCol + 1; ci < Math.max(h1.length, h2.length) && pointsCol === -1; ci++){
      const vals = bodyRows.map(r => cellStr(r[ci])).filter(v => v !== '');
      if(vals.length && vals.every(v => toNum(v) !== null || /^yes\s*-|no\s*-/i.test(v))) pointsCol = ci;
    }
  }

  // yes/no columns = every column at/after (pointsCol+1) that has a sub-header (h2)
  // or yes/no body values. Collect them in order.
  const nCols = Math.max(h1.length, h2.length, ...bodyRows.map(r => r.length));
  const ynCols = [];
  for(let ci = Math.max(pointsCol + 1, condCol + 1); ci < nCols; ci++){
    const sub = cellStr(h2[ci]);
    const bodyHasYN = bodyRows.some(r => /^(yes|no)$/i.test(cellStr(r[ci])));
    if(sub !== '' || bodyHasYN) ynCols.push(ci);
  }

  // group the yn columns by their h1 top-label (carry-forward across empty h1 cells)
  const groups = [];
  let curLabel = null;
  for(const ci of ynCols){
    let top = cellStr(h1[ci]);
    if(top === ''){
      // carry forward: search left until a non-empty h1 within the yn region
      for(let k = ci - 1; k > pointsCol; k--){
        if(cellStr(h1[k]) !== ''){ top = cellStr(h1[k]); break; }
      }
    }
    if(groups.length === 0 || groups[groups.length-1].label !== top){
      groups.push({ label: top, cols: [ci] });
      curLabel = top;
    } else {
      groups[groups.length-1].cols.push(ci);
    }
  }

  const hasGroups = groups.some(g => g.label !== '');

  const topHeader = `
    <tr>
      <th class="c-condition" rowspan="2">Condition</th>
      <th rowspan="2" style="text-align:center;">Points</th>
      ${groups.map(g => `<th class="group-head" colspan="${g.cols.length}">${escapeHtml(g.label)}</th>`).join('')}
    </tr>
    <tr>
      ${ynCols.map(ci => `<th class="sub-head">${escapeHtml(cellStr(h2[ci]))}</th>`).join('')}
    </tr>`;

  const body = bodyRows.map(r => `
    <tr>
      <td class="c-condition">${escapeHtml(cellStr(r[condCol]))}</td>
      <td class="c-points">${escapeHtml(cellStr(r[pointsCol]))}</td>
      ${ynCols.map(ci => `<td>${formatYesNo(cellStr(r[ci]))}</td>`).join('')}
    </tr>`).join('');

  // footnote (the "Прогноз робимо лише..." paragraph)
  let footnote = '';
  for(let ri = endIdx; ri < raw.length; ri++){
    const text = raw[ri].map(cellStr).filter(v => v !== '').join(' ');
    if(text.length > 40 && !/^(група|group|play|general|\d+%)/i.test(text)){ footnote = text; break; }
  }
  const note = footnote ? `<div class="rules-note">${escapeHtml(footnote)}</div>` : '';

  return `
  <div class="rules-block table-card">
    <table class="sheet-table rules">
      <thead>${topHeader}</thead>
      <tbody>${body}</tbody>
    </table>
  </div>${note}`;
}

function formatYesNo(v){
  const s = cellStr(v);
  if(/^yes$/i.test(s)) return '<span class="yn yes">yes</span>';
  if(/^no$/i.test(s)) return '<span class="yn no">no</span>';
  return escapeHtml(s);
}

/* ======== DISPATCH ======== */
function renderTabContent(tab, data){
  if(tab.kind === 'leaderboard') return renderLeaderboard(data);
  if(tab.kind === 'rules') return renderRules(data);
  // explicit renderers (bypass auto-detect to avoid mis-routing)
  if(tab.kind === 'pairWinners'){ return renderPairWinners(data) || renderGenericTable(data); }
  if(tab.kind === 'special'){ return renderSpecialBets(data) || renderGenericTable(data); }
  if(tab.kind === 'groupPositions'){ return renderGroupPositions(data) || renderGenericTable(data); }
  const pairs = renderPairWinners(data);
  if(pairs) return pairs;
  const matches = renderMatches(data);
  if(matches) return matches;
  const positions = renderGroupPositions(data);
  if(positions) return positions;
  const special = renderSpecialBets(data);
  if(special) return special;
  return renderGenericTable(data);
}

/* ======== UI ======== */
async function loadActiveTab(){
  const tab = activeTournament.tabs[activeTabIndex];
  const content = document.getElementById('content');
  const fromDb = activeTournament.source === 'supabase';
  content.innerHTML = '<div class="status-line">Завантаження даних' +
    (fromDb ? '...' : ' з Google Sheets...') + '</div>';
  try{
    const data = fromDb
      ? await fetchSupabaseTab(tab)
      : await fetchSheet(activeTournament.sheetId, tab.sheet, tab.gid);
    if(activeTournament.tabs[activeTabIndex] !== tab) return;
    content.innerHTML = renderTabContent(tab, data);
  }catch(err){
    content.innerHTML = `<div class="status-line err">Не вдалося завантажити вкладку «${escapeHtml(tab.sheet)}»: ${escapeHtml(err.message)}</div>`;
  }
}

function renderTabs(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = activeTournament.tabs.map((t, idx) =>
    `<button data-idx="${idx}" class="${idx === activeTabIndex ? 'active' : ''}">${escapeHtml(t.sheet)}</button>`
  ).join('');
  nav.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTabIndex = Number(btn.dataset.idx);
      nav.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
      loadActiveTab();
    });
  });
}

function renderTournaments(){
  const nav = document.getElementById('tournaments');
  nav.innerHTML = TOURNAMENTS.map(t =>
    `<button data-key="${t.key}" class="${t.key === activeTournament.key ? 'active' : ''}">${escapeHtml(t.title)}</button>`
  ).join('');
  nav.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => setTournament(btn.dataset.key));
  });
}

function setTournament(key){
  const t = TOURNAMENTS.find(x => x.key === key);
  if(!t) return;
  activeTournament = t;
  activeTabIndex = 0;
  document.getElementById('tournament-title').textContent = t.title;
  document.querySelectorAll('nav.tournaments button').forEach(b =>
    b.classList.toggle('active', b.dataset.key === key));
  renderTabs();
  loadActiveTab();
  updateTimestamp();
}

function updateTimestamp(){
  document.getElementById('updated-at').textContent =
    'Оновлено: ' + new Date().toLocaleTimeString('uk-UA', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

async function refreshAll(){
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  Object.keys(cache).forEach(k => delete cache[k]);
  await loadActiveTab();
  updateTimestamp();
  btn.disabled = false;
}

document.getElementById('refresh-btn').addEventListener('click', refreshAll);

/* ======== КАБІНЕТ (модалка з app.html) ======== */
(function(){
  const overlay = document.getElementById('cabinet-overlay');
  const frame   = document.getElementById('cabinet-frame');
  const btn     = document.getElementById('cabinet-btn');
  const closeBtn= document.getElementById('cabinet-close');

  // Чи є жива сесія Supabase — щоб підписати кнопку
  function signedIn(){
    try{
      for (let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        if (k && k.startsWith('sb-') && k.endsWith('-auth-token')) return true;
      }
    }catch(e){}
    return false;
  }
  function labelBtn(){
    btn.textContent = signedIn() ? '⚽ Мій кабінет' : '⚽ Увійти';
  }
  labelBtn();

  async function open(){
    // Модалку показуємо одразу
    overlay.classList.add('open');
    document.body.classList.add('cabinet-lock');
    // iframe вантажиться лише при першому відкритті
    if (!frame.getAttribute('src')){
      let appSrc = 'app.html';
      // На test.html пробуємо тестовий кабінет; якщо його не залито —
      // тихо відкриваємо бойовий, щоб кнопка ніколи не була «мертвою».
      if (/(^|\/)test\.html$/.test(location.pathname)){
        try {
          const r = await fetch('app-test.html', { method: 'HEAD' });
          if (r.ok) appSrc = 'app-test.html';
        } catch(e) {}
      }
      frame.setAttribute('src', appSrc);
    }
  }
  function close(){
    overlay.classList.remove('open');
    document.body.classList.remove('cabinet-lock');
    labelBtn();
  }

  btn.addEventListener('click', open);
  closeBtn.addEventListener('click', close);
  overlay.addEventListener('mousedown', e => { if (e.target === overlay) close(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) close();
  });

  // app.html може попросити закритись: parent.postMessage('bobet:close','*')
  window.addEventListener('message', e => {
    if (e.data === 'bobet:close') close();
  });

  // #cabinet у посиланні одразу відкриває кабінет
  if (location.hash === '#cabinet') open();
})();

/* ======== INIT ======== */
renderTournaments();
setTournament(activeTournament.key);
setInterval(() => {
  if (!document.getElementById('cabinet-overlay').classList.contains('open')) refreshAll();
}, 60000);
</script>
