<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BoBet · Fantasy League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0E1410;
    --panel: #151D17;
    --panel-2: #1B251D;
    --panel-3: #212D23;
    --line: #2A362B;
    --text: #EDEFE8;
    --text-dim: #8B9A8C;
    --gold: #E8B23C;
    --teal: #6FAFAF;
    --blue: #5E97D0;
    --purple: #A98FDB;
    --purple-soft: rgba(169,143,219,0.12);
    --green: #4CAE6B;
    --green-soft: rgba(76,174,107,0.14);
    --red: #C75C4A;
    --red-soft: rgba(199,92,74,0.14);
    --gold-soft: rgba(232,178,60,0.10);
    --field-line: rgba(237,239,232,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, var(--field-line) 0px, var(--field-line) 1px, transparent 1px, transparent 64px),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:2100px;margin:0 auto;padding:0 48px 80px;}

  /* ===== HEADER ===== */
  header{
    padding:36px 0 0;
    border-bottom:1px solid var(--line);
    margin-bottom:28px;
  }
  .head-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:22px;
  }
  .brand-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--green);
    margin:0 0 10px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:42px;
    line-height:1.05;
    margin:0;
    letter-spacing:-0.01em;
    text-transform:uppercase;
  }
  .meta-block{
    text-align:right;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--text-dim);
  }
  #refresh-btn{
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    padding:9px 16px;
    border-radius:6px;
    cursor:pointer;
    margin-top:8px;
    transition:border-color .15s;
  }
  #refresh-btn:hover{border-color:var(--green);}
  #refresh-btn:focus-visible{outline:2px solid var(--green); outline-offset:2px;}
  #refresh-btn:disabled{opacity:0.6; cursor:wait;}

  nav.tournaments{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    padding-bottom:20px;
  }
  nav.tournaments button{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text-dim);
    font-family:'Space Grotesk',sans-serif;
    font-size:16px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.03em;
    padding:12px 24px;
    border-radius:8px;
    cursor:pointer;
    transition:all .15s;
  }
  nav.tournaments button:hover{color:var(--text); border-color:var(--green);}
  nav.tournaments button.active{
    background:var(--green);
    border-color:var(--green);
    color:#0E1410;
  }
  nav.tournaments button:focus-visible{outline:2px solid var(--green); outline-offset:2px;}

  nav.tabs{
    display:flex;
    gap:4px;
    margin-bottom:28px;
    overflow-x:auto;
    border-bottom:1px solid var(--line);
    scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{display:none;}
  nav.tabs button{
    background:transparent;
    border:none;
    color:var(--text-dim);
    font-family:'Space Grotesk',sans-serif;
    font-size:17px;
    font-weight:600;
    padding:12px 18px;
    cursor:pointer;
    white-space:nowrap;
    border-bottom:2px solid transparent;
    transition:color .15s, border-color .15s;
  }
  nav.tabs button:hover{color:var(--text);}
  nav.tabs button.active{color:var(--green); border-bottom-color:var(--green);}
  nav.tabs button:focus-visible{outline:2px solid var(--green); outline-offset:-2px;}

  /* ===== LEADERBOARDS ===== */
  .boards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
    gap:24px;
    align-items:start;
  }
  .board{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
  }
  .board-head{
    padding:14px 18px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    border-bottom:1px solid var(--line);
    background:var(--panel-2);
    color:var(--text);
  }
  /* stage accents (match the sheet: Group=teal, Play-off=blue, General=gold) */
  .board.stage-group .board-head{color:var(--teal); box-shadow:inset 0 3px 0 var(--teal);}
  .board.stage-playoff .board-head{color:var(--blue); box-shadow:inset 0 3px 0 var(--blue);}
  .board.stage-knockout .board-head{color:#B98FE0; box-shadow:inset 0 3px 0 #B98FE0;}
  .board.stage-general .board-head{color:var(--gold); box-shadow:inset 0 3px 0 var(--gold);}
  .lb-row{
    display:flex;
    align-items:center;
    gap:16px;
    padding:16px 22px;
    border-bottom:1px solid var(--line);
    transition:background .12s;
  }
  .lb-row:last-child{border-bottom:none;}
  .lb-row.p1{background:linear-gradient(90deg, rgba(232,178,60,0.16), rgba(232,178,60,0.03));}
  .lb-row.p2{background:linear-gradient(90deg, rgba(199,205,195,0.14), rgba(199,205,195,0.02));}
  .lb-row.p3{background:linear-gradient(90deg, rgba(201,123,74,0.14), rgba(201,123,74,0.02));}
  .lb-rank{
    font-family:'JetBrains Mono',monospace;
    font-size:15px;
    font-weight:700;
    min-width:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-dim);
    flex-shrink:0;
  }
  .lb-row.p1 .lb-rank{color:var(--gold);}
  .lb-row.p2 .lb-rank{color:#C7CDC3;}
  .lb-row.p3 .lb-rank{color:#C97B4A;}
  .lb-rank .crown{font-size:26px;}
  .lb-name{
    flex:1;
    font-family:'Space Grotesk',sans-serif;
    font-size:21px;
    font-weight:500;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .lb-row.p1 .lb-name, .lb-row.p2 .lb-name, .lb-row.p3 .lb-name{font-weight:700;}
  .lb-pts{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:25px;
    color:var(--text);
    flex-shrink:0;
    font-variant-numeric:tabular-nums;
  }
  .lb-row.p1 .lb-pts{color:var(--gold);}
  .lb-row.p2 .lb-pts{color:#C7CDC3;}
  .lb-row.p3 .lb-pts{color:#C97B4A;}

  /* ===== MATCHES ===== */
  .matches-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:auto;
  }
  table.matches{
    width:100%;
    border-collapse:collapse;
    font-size:15px;
    table-layout:fixed;
  }
  table.matches thead th{
    position:sticky;
    top:0;
    z-index:2;
    background:var(--panel-2);
    border-bottom:1px solid var(--line);
    padding:12px 12px 10px;
    text-align:center;
    vertical-align:bottom;
  }
  table.matches thead th.meta{
    text-align:center;
    font-family:'Space Grotesk',sans-serif;
    font-size:16px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    padding:12px 12px 10px;
  }
  table.matches thead th.meta.th-game{text-align:center;}
  /* separate Points totals row (gold), above the player-names row */
  table.matches thead tr.totals-row th{
    background:var(--gold-soft);
    padding:8px 12px;
    border-bottom:1px solid var(--line);
    text-align:center;
  }
  table.matches thead th.totals-label{
    text-align:right;
    font-family:'Space Grotesk',sans-serif;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--gold);
  }
  table.matches thead th.totals-val{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:16px;
    color:var(--gold);
    font-variant-numeric:tabular-nums;
  }
  table.matches thead th.p-name-cell{
    text-align:center;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:19px;
    color:var(--text);
    padding:12px;
  }
  .player-head{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
  }
  .player-head .p-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:15px;
    color:var(--text);
    letter-spacing:0.01em;
  }
  .player-head .p-total{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:14px;
    color:var(--gold);
    background:var(--gold-soft);
    padding:3px 12px;
    border-radius:20px;
    font-variant-numeric:tabular-nums;
  }
  table.matches td{
    padding:14px 10px;
    border-bottom:1px solid var(--line);
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:19px;
    color:var(--text-dim);
    white-space:nowrap;
  }
  table.matches tbody tr:last-child td{border-bottom:none;}
  td.c-date{
    text-align:center;
    font-size:16px;
    color:var(--text-dim);
    white-space:normal;
  }
  td.c-game{
    text-align:center;
    font-family:'Inter',sans-serif;
    font-weight:500;
    font-size:20px;
    color:var(--text);
    white-space:normal;
  }
  .flag{
    display:inline-block;
    width:24px;
    height:18px;
    border-radius:2px;
    object-fit:cover;
    vertical-align:middle;
    flex-shrink:0;
    box-shadow:0 0 0 1px rgba(255,255,255,0.08);
  }
  .crest{
    display:inline-block;
    width:22px;
    height:22px;
    object-fit:contain;
    vertical-align:middle;
    flex-shrink:0;
  }
  .team{display:inline-flex; align-items:center; gap:8px;}
  .game-teams{display:inline-flex; align-items:center; justify-content:center; gap:7px; flex-wrap:wrap;}
  .game-teams .vs{color:var(--text-dim); margin:0 2px;}
  td.c-result{
    font-weight:700;
    font-size:20px;
    color:var(--gold);
    background:rgba(232,178,60,0.07);
    box-shadow:inset 1px 0 0 rgba(232,178,60,0.28), inset -1px 0 0 rgba(232,178,60,0.28);
  }
  .result-pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    min-width:68px;
    max-width:100%;
    padding:6px 14px;
    border-radius:8px;
    background:rgba(232,178,60,0.22);
    border:1px solid rgba(232,178,60,0.55);
    color:#F5D488;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.03em;
  }
  .result-pill .team{gap:8px; min-width:0;}
  .result-pill .team span{overflow:hidden; text-overflow:ellipsis;}
  table.matches thead th.th-result{color:var(--gold);}
  td.pred{position:relative;}
  td.pred.exact{
    background:rgba(76,174,107,0.45);
    color:#EFFAF0;
    font-weight:700;
    box-shadow:inset 0 0 0 1px rgba(76,174,107,0.7);
  }
  /* вгаданий результат (перемога/нічия) — без заливки, лише яскравий текст */
  td.pred.outcome{
    color:var(--text);
    font-weight:700;
  }
  .chip.outcome{background:rgba(237,239,232,0.9);}
  tr.day-start td{border-top:2px solid var(--panel-3);}
  tr.day-even td.c-date, tr.day-even td.c-game{background:rgba(255,255,255,0.02);}
  /* stage separators (1/8, 1/4, Semifinals, Final) */
  tr.sep-row td{
    background:var(--panel-3);
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--gold);
    text-align:center;
    padding:10px 12px;
  }
  .legend{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-top:14px;
    font-size:12px;
    color:var(--text-dim);
  }
  .legend span{display:inline-flex; align-items:center; gap:7px;}
  .chip{
    display:inline-block;
    width:22px; height:14px;
    border-radius:3px;
  }
  .chip.exact{background:rgba(76,174,107,0.45); box-shadow:inset 0 0 0 1px rgba(76,174,107,0.7);}

  /* ===== GROUPS BLOCK (Group A–F team compositions) ===== */
  .groups-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:14px;
    margin-bottom:24px;
  }
  .group-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  .group-card .g-head{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:9px 14px;
    background:var(--panel-2);
    border-bottom:1px solid var(--line);
  }
  .group-card .g-team{
    font-size:13px;
    padding:7px 14px;
    border-bottom:1px solid var(--line);
    color:var(--text);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .group-card .g-team:last-child{border-bottom:none;}

  /* ===== GROUP POSITIONS ===== */
  .gp-wrap{
    display:grid;
    grid-template-columns:1fr;
    gap:18px;
    margin-bottom:22px;
    align-items:start;
  }
  .gp-block{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:auto;
  }
  .gp-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 16px;
    background:var(--panel-2);
    border-bottom:1px solid var(--line);
  }
  .gp-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--gold);
  }
  table.gp-table{
    width:100%;
    border-collapse:collapse;
    font-size:15px;
  }
  table.gp-table th{
    text-align:center;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-dim);
    padding:9px 14px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  table.gp-table th.gp-player{
    color:var(--text);
    font-weight:700;
    font-size:18px;
    letter-spacing:0.02em;
    text-transform:none;
  }
  table.gp-table th.gp-seed-h{color:var(--text-dim);}
  table.gp-table th.gp-actual-h{color:var(--gold); font-weight:700; font-size:16px;}
  table.gp-table td{
    padding:11px 16px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
    font-size:17px;
    text-align:center;
  }
  table.gp-table .team{justify-content:center;}
  table.gp-table tbody tr:last-child td{border-bottom:none;}
  .gp-rank{
    font-family:'JetBrains Mono',monospace;
    color:var(--text-dim);
    width:44px;
    font-size:15px;
    text-align:center;
  }
  .gp-seed{
    color:var(--text-dim);
    border-right:1px solid var(--line);
  }
  .gp-seed .team{gap:7px;}
  .gp-seed .flag{width:20px; height:15px;}
  .gp-actualteam{
    font-weight:600;
    background:rgba(232,178,60,0.07);
    box-shadow:inset 1px 0 0 rgba(232,178,60,0.28), inset -1px 0 0 rgba(232,178,60,0.28);
  }
  .gp-actualteam .result-pill{
    font-family:'Inter',sans-serif;
    font-size:16px;
    padding:4px 12px;
    min-width:0;
  }
  .gp-actualteam .result-pill .flag{width:20px; height:15px;}
  .gp-actualteam .team, .gp-pred .team{gap:7px;}
  .gp-actualteam .flag, .gp-pred .flag{width:20px; height:15px;}
  .gp-pred{color:var(--text-dim);}
  .gp-pred.hit{
    background:var(--green-soft);
    color:var(--green);
    font-weight:700;
  }
  /* Points summary on top */
  .gp-summary{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:22px;
  }
  .gp-summary-cell{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    min-width:96px;
    flex:1;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
  }
  .gp-summary-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:17px;
    color:var(--text);
  }
  .gp-summary-pts{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:24px;
    color:var(--gold);
    font-variant-numeric:tabular-nums;
  }

  /* ===== SPECIAL BETS ===== */
  table.special{table-layout:fixed;}
  table.special th.sb-th{
    font-family:'Space Grotesk',sans-serif;
    font-size:16px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
  }
  table.special th.sb-th-player{
    text-align:center;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:19px;
    color:var(--text);
    text-transform:none;
    letter-spacing:0.01em;
  }
  table.special td.sb-label{
    text-align:left;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:18px;
    color:var(--text);
    white-space:normal;
  }
  table.special td.sb-actual{text-align:center;}
  table.special td.sb-actual{
    background:rgba(232,178,60,0.07);
    box-shadow:inset 1px 0 0 rgba(232,178,60,0.28), inset -1px 0 0 rgba(232,178,60,0.28);
  }
  table.special th.sb-th-actual{color:var(--gold);}
  td.sb-actual .result-pill{
    font-family:'Inter',sans-serif;
    font-size:17px;
    min-width:0;
    padding:6px 10px;
    max-width:100%;
  }
  /* назва результату не обрізається трьома крапками — краще трохи менший шрифт */
  td.sb-actual .result-pill .team span{overflow:visible; text-overflow:clip; white-space:nowrap;}
  table.special td.sb-val{
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:18px;
    white-space:normal;
  }
  table.special td.sb-val .team{justify-content:center; gap:7px;}
  table.special td.sb-val.sb-hit{
    background:rgba(76,174,107,0.45);
    color:#EFFAF0;
    font-weight:700;
    box-shadow:inset 0 0 0 1px rgba(76,174,107,0.7);
  }
  table.special tr.sb-points td{
    background:var(--gold-soft);
    border-bottom:1px solid var(--line);
  }
  table.special tr.sb-points td.sb-label{color:var(--gold);}
  table.special tr.sb-points td.sb-val{
    color:var(--gold);
    font-weight:700;
  }
  table.special tr.sb-points td.sb-val.scored{color:var(--green);}

  /* ===== BOOSTS ===== */
  .boosts-card{margin-top:22px;}
  table.boosts th.boost-head{
    color:var(--gold);
    font-size:13px;
    letter-spacing:0.08em;
    white-space:nowrap;
  }
  table.boosts th.boost-player{
    text-align:center;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:17px;
    color:var(--text);
    text-transform:none;
    letter-spacing:0.01em;
  }
  table.boosts td.boost-label{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:16px;
    color:var(--gold);
    background:var(--gold-soft);
    white-space:nowrap;
  }
  table.boosts td.boost-val{
    text-align:center;
    font-size:15px;
    color:var(--text-dim);
    white-space:normal;
    line-height:1.6;
    padding:12px 8px;
  }
  table.boosts{table-layout:fixed;}
  .boost-scores{
    display:block;
    font-family:'JetBrains Mono',monospace;
    font-size:15px;
    margin-top:4px;
    color:var(--text-dim);
  }
  .boost-scores b{color:var(--text); font-weight:700;}
  table.boosts td.boost-val .flag, table.boosts td.boost-val .crest{width:18px; height:13px;}
  table.boosts td.boost-val .crest{height:18px;}

  /* ===== BOOST COLOURS =====
     ДВА НАБОРИ, навмисно.
     b* — архівні турніри. Кольори повторюють контури з Google Sheets,
     їх не чіпаємо: Euro 2024, CL 2025, Club WC і WC 2026 мають
     лишитись такими, якими були.
     lb* — EuroSeason 2026. Тут бустів сім, і раніше чотири з них
     падали в один сірий bgen — через це вони й не розрізнялись.
     Ці кольори збігаються з константою BOOST_COLORS в app.html. */
  :root{
    --b2x: #C2568F;
    --b3x: #57BE7A;
    --bdp: #5E97D0;
    --bot: #E8B23C;
    --bgen: #A98FDB;

    --lbdp: #40C4FF;   /* Double Predict — блакитний */
    --lbgd: #B388FF;   /* Різниця голів — бузковий   */
    --lb2x: #FFD740;   /* 2x — жовтий                */
    --lbtot:#69F0AE;   /* Total 3.5+ — зелений       */
    --lbap: #FF9100;   /* Автопілот — помаранчевий   */
    --lbbt: #FF4081;   /* Обидві заб'ють — рожевий   */
    --lb3x: #FF5252;   /* 3x — червоний              */
  }
  td.pred.boosted{
    position:relative;
    border-radius:4px;
  }
  td.pred.b2x{box-shadow:inset 0 0 0 5px var(--b2x);}
  td.pred.b3x{box-shadow:inset 0 0 0 5px var(--b3x);}
  td.pred.bdp{box-shadow:inset 0 0 0 5px var(--bdp);}
  td.pred.bot{box-shadow:inset 0 0 0 5px var(--bot);}
  td.pred.lbdp{box-shadow:inset 0 0 0 5px var(--lbdp);}
  td.pred.lbgd{box-shadow:inset 0 0 0 5px var(--lbgd);}
  td.pred.lb2x{box-shadow:inset 0 0 0 5px var(--lb2x);}
  td.pred.lbtot{box-shadow:inset 0 0 0 5px var(--lbtot);}
  td.pred.lbap{box-shadow:inset 0 0 0 5px var(--lbap);}
  td.pred.lbbt{box-shadow:inset 0 0 0 5px var(--lbbt);}
  td.pred.lb3x{box-shadow:inset 0 0 0 5px var(--lb3x);}
  td.pred.bgen{box-shadow:inset 0 0 0 5px var(--bgen);}
  /* вгаданий рахунок + буст: лишаємо зелену заливку і контур буста поверх */
  td.pred.exact.b2x{box-shadow:inset 0 0 0 5px var(--b2x);}
  td.pred.exact.b3x{box-shadow:inset 0 0 0 5px var(--b3x);}
  td.pred.exact.bdp{box-shadow:inset 0 0 0 5px var(--bdp);}
  td.pred.exact.bot{box-shadow:inset 0 0 0 5px var(--bot);}
  .dp-alt{
    display:block;
    font-size:13px;
    color:var(--text-dim);
    margin-top:2px;
  }
  td.pred.exact .dp-alt{color:rgba(239,250,240,0.75);}
  /* Double Predict до внесення результату: жоден із двох рахунків
     не головний, тому другий не приглушуємо. Два класи в селекторі —
     щоб перебити .dp-alt із медіазапитів незалежно від порядку. */
  .dp-alt.dp-even{
    font-size:inherit;
    font-weight:inherit;
    color:inherit;
    opacity:1;
  }
  .chip.b2x{background:transparent; box-shadow:inset 0 0 0 5px var(--b2x);}
  .chip.b3x{background:transparent; box-shadow:inset 0 0 0 5px var(--b3x);}
  .chip.bdp{background:transparent; box-shadow:inset 0 0 0 5px var(--bdp);}
  .chip.bot{background:transparent; box-shadow:inset 0 0 0 5px var(--bot);}
  .chip.bgen{background:transparent; box-shadow:inset 0 0 0 5px var(--bgen);}
  .chip.lbdp{background:transparent; box-shadow:inset 0 0 0 5px var(--lbdp);}
  .chip.lbgd{background:transparent; box-shadow:inset 0 0 0 5px var(--lbgd);}
  .chip.lb2x{background:transparent; box-shadow:inset 0 0 0 5px var(--lb2x);}
  .chip.lbtot{background:transparent; box-shadow:inset 0 0 0 5px var(--lbtot);}
  .chip.lbap{background:transparent; box-shadow:inset 0 0 0 5px var(--lbap);}
  .chip.lbbt{background:transparent; box-shadow:inset 0 0 0 5px var(--lbbt);}
  .chip.lb3x{background:transparent; box-shadow:inset 0 0 0 5px var(--lb3x);}
  table.boosts td.boost-label.lbdp{color:var(--lbdp); box-shadow:inset 3px 0 0 var(--lbdp);}
  table.boosts td.boost-label.lbgd{color:var(--lbgd); box-shadow:inset 3px 0 0 var(--lbgd);}
  table.boosts td.boost-label.lb2x{color:var(--lb2x); box-shadow:inset 3px 0 0 var(--lb2x);}
  table.boosts td.boost-label.lbtot{color:var(--lbtot); box-shadow:inset 3px 0 0 var(--lbtot);}
  table.boosts td.boost-label.lbap{color:var(--lbap); box-shadow:inset 3px 0 0 var(--lbap);}
  table.boosts td.boost-label.lbbt{color:var(--lbbt); box-shadow:inset 3px 0 0 var(--lbbt);}
  table.boosts td.boost-label.lb3x{color:var(--lb3x); box-shadow:inset 3px 0 0 var(--lb3x);}
  table.boosts td.boost-label.b2x{color:var(--b2x); background:rgba(194,86,143,0.12); box-shadow:inset 3px 0 0 var(--b2x);}
  table.boosts td.boost-label.b3x{color:var(--b3x); background:rgba(87,190,122,0.12); box-shadow:inset 3px 0 0 var(--b3x);}
  table.boosts td.boost-label.bdp{color:var(--bdp); background:rgba(94,151,208,0.12); box-shadow:inset 3px 0 0 var(--bdp);}
  table.boosts td.boost-label.bot{color:var(--bot); background:var(--gold-soft); box-shadow:inset 3px 0 0 var(--bot);}

  /* ===== GENERIC TABLE ===== */
  .table-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:auto;
    margin-bottom:24px;
  }
  table.sheet-table{
    width:100%;

  }

    padding:11px 16px;

  table.sheet-table tbody tr:last-child td{border-bottom:none;}
  table.sheet-table tbody tr:nth-child(even){background:rgba(255,255,255,0.015);}
  table.sheet-table tbody tr:hover{background:rgba(76,174,107,0.06);}
  /* uniform Points highlighting in generic tables */
  table.sheet-table th.th-points{
    color:var(--gold);
    font-weight:700;
  }
  table.sheet-table td.td-points{
    font-family:'JetBrains Mono',monospace;

  /* ===== RULES ===== */
  .rules-block{margin-bottom:26px;}

  }
  table.rules thead th{padding:14px 14px;}
  table.rules td{padding:15px 14px;}
  table.rules td{text-align:center;}
  table.rules td.c-condition{
    text-align:left;
    font-family:'Inter',sans-serif;

  }
  table.rules td.c-points{
    font-family:'JetBrains Mono',monospace;

    color:var(--gold);

  .yn{
    display:inline-block;

    font-weight:700;
    text-transform:uppercase;
    padding:5px 16px;

  }
  .yn.yes{color:var(--green); background:var(--green-soft); border:1px solid rgba(76,174,107,0.4);}

  .rules-note{

  .status-line{

  ::-webkit-scrollbar{height:8px; width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}

  /* ===== RESPONSIVE ===== */

    table.special td.sb-label, table.special th.sb-th-player{font-size:13px;}
    table.special td.sb-val{font-size:13px;}

  }

  /* ===================================================================
     ВЕЛИКІ ЕКРАНИ (зовнішні монітори, Studio Display, 4K/5K).

  /* ===================================================================

  /* ===================== КАБІНЕТ (модалка з app.html) ===================== */

/* =====================================================================

   але з бази. Завдяки цьому жоден рендер не переписується: сайт не
   бачить різниці між архівним турніром і живим.

const SB_URL = 'https://wsdamzcezumjmgxmvakw.supabase.co';
const SB_KEY = 'sb_publishable_bkXuSYswtmg4xCtecLb9cw_No0oCuSo';

/* Сайт упізнає гравців за вбудованим списком імен. Щоб новий учасник
   не зник із таблиці мовчки, доповнюємо цей список із бази. */
function registerPlayers(names){
  if(typeof KNOWN_PLAYERS === 'undefined') return;
  names.forEach(n => {
    const k = String(n).trim().toLowerCase();
    if(k && !KNOWN_PLAYERS.includes(k)) KNOWN_PLAYERS.push(k);
  });
}

async function sbGet(path){
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    headers:{ apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }
  });
  if(!res.ok) throw new Error('база відповіла ' + res.status);
  return res.json();
}

/* Порожня сітка потрібного розміру */
function grid(rowCount, colCount){
  return Array.from({ length: rowCount }, () => Array(colCount).fill(''));
}

function fmtScore(h, a){
  return (h === null || h === undefined || a === null || a === undefined)
    ? '' : h + ':' + a;
}

function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  const p = n => String(n).padStart(2, '0');
  return p(d.getDate()) + '.' + p(d.getMonth() + 1) + '.' + d.getFullYear();
}

/* ---------------------------------------------------------------------
   ЛІДЕРБОРД: чотири борди в ряд — August | September | October | General

   Рендер шукає рядок із клітинками «Name». Кожна така клітинка задає
   борд із колонок [№ | Name | Points], а назва борда лежить рядком вище
   над колонкою №. Відтворюємо саме це.
   --------------------------------------------------------------------- */
async function buildLeaderboardRows(){
  const tours = await sbGet(
    'tournaments?select=id,key,title,status&key=in.(aug2026,sep2026,oct2026)');
  const byKey = {};
  tours.forEach(t => { byKey[t.key] = t; });

  const monthly = await sbGet(
    'leaderboard?select=tournament_id,display_name,total_points,place');
  const season = await sbGet(
    'season_leaderboard?select=display_name,total_points,place&order=place.asc');

  // Склад гравців: беремо з будь-якого місяця, який уже видно.
  const roster = [...new Set(monthly.map(r => r.display_name))];
  registerPlayers(roster.concat(season.map(r => r.display_name)));

  const boards = [];
  for(const m of MONTHS){
    const t = byKey[m.key];
    const rows = t
      ? monthly.filter(r => r.tournament_id === t.id).sort((a, b) => a.place - b.place)
      : [];
    // Місяць ще не стартував — показуємо борд із нулями, як у таблиці.
    boards.push({
      title: m.label,
      rows: rows.length ? rows
        : roster.map((n, i) => ({ place: 1, display_name: n, total_points: 0 }))
    });
  }
  boards.push({ title:'General', rows: season });

  const BOARD_W = 4;                       // №, Name, Points, порожня
  const cols = boards.length * BOARD_W;
  const depth = Math.max(1, ...boards.map(b => b.rows.length));
  const out = grid(depth + 2, cols);

  boards.forEach((b, bi) => {
    const c = bi * BOARD_W;
    out[0][c]     = b.title;               // назва борда над колонкою №
    out[1][c]     = '№';
    out[1][c + 1] = 'Name';
    out[1][c + 2] = 'Points';
    b.rows.forEach((r, ri) => {
      out[ri + 2][c]     = r.place;
      out[ri + 2][c + 1] = r.display_name;
      out[ri + 2][c + 2] = r.total_points;
    });
  });

  return out;
}

/* ---------------------------------------------------------------------
   МІСЯЦЬ: список матчів по вікендах

   Рендер шукає рядок із підписами Game і Result, імена гравців праворуч
   від Result, а тотали — у рядку з підписом Points вище. Роздільник
   стадії — рядок, де в колонці дати стоїть текст, а колонка Game порожня.
   Саме так і робимо «Вікенд 1», «Вікенд 2».
   --------------------------------------------------------------------- */
async function buildMonthRows(tournamentKey){
  const tours = await sbGet(
    'tournaments?select=id,key&key=eq.' + tournamentKey);
  if(!tours.length) return [['Цей місяць ще не відкрито']];
  const tid = tours[0].id;

  const weeks = await sbGet(
    'gameweek_status?select=gameweek_id,number,title,deadline_at,is_open' +
    '&tournament_id=eq.' + tid + '&order=number.asc');

  // Учасники — весь сезонний склад (серпень+вересень+жовтень), щоб усі три
  // місяці показували однакові колонки гравців. Інакше місяць, у якому ще
  // ніхто не зареєстрований, лишався б без колонок і таблиця ламалась.
  const seasonTours = await sbGet('tournaments?select=id&key=in.(aug2026,sep2026,oct2026)');
  const seasonIds = seasonTours.map(t => t.id).join(',');
  const people = await sbGet(
    'participants?select=display_name&tournament_id=in.(' + seasonIds + ')' +
    '&order=display_name.asc');

  const board = await sbGet(
    'match_board?select=gameweek_id,position,home_team,away_team,kickoff_at,' +
    'home_score,away_score,display_name,pred_home,pred_away,' +
    'pred_home_2,pred_away_2,boost_code');

  const boostTypes = await sbGet('boost_types?select=code,title,sort_order&order=sort_order.asc');

  // Рядок «Points» у місячній таблиці — ЛИШЕ бали за матчі.
  // Бали за бонусні питання живуть у своїй вкладці, а сума
  // матчі+бонуси показується в Leaderboard (файл 44).
  const totals = await sbGet(
    'leaderboard?select=display_name,match_points&tournament_id=eq.' + tid);

  const names = [...new Set(people.map(p => p.display_name))];
  registerPlayers(names);
  // Матчі — відкрита інформація: показуємо розклад завжди. Прогнози
  // ховаються окремо, тут лишаються порожні клітинки до дедлайну.

  const COL_DATE = 0, COL_GAME = 1, COL_RES = 2, COL_FIRST = 4;
  const cols = COL_FIRST + names.length;
  const out = [];

  // рядок тоталів
  const totalRow = Array(cols).fill('');
  totalRow[COL_DATE] = 'Points';
  const totalByName = {};
  totals.forEach(t => { totalByName[t.display_name] = t.match_points; });
  names.forEach((n, i) => {
    totalRow[COL_FIRST + i] = (totalByName[n] === undefined ? 0 : totalByName[n]);
  });
  out.push(totalRow);

  // рядок шапки з іменами
  const head = Array(cols).fill('');
  head[COL_DATE] = 'Date';
  head[COL_GAME] = 'Game';
  head[COL_RES]  = 'Result';
  names.forEach((n, i) => { head[COL_FIRST + i] = n; });
  out.push(head);

  // тіло: вікенд за вікендом
  for(const w of weeks){
    const sep = Array(cols).fill('');
    sep[COL_DATE] = w.title || ('Вікенд ' + w.number);
    out.push(sep);

    const inWeek = board.filter(b => b.gameweek_id === w.gameweek_id);
    const positions = [...new Set(inWeek.map(b => b.position))].sort((a, z) => a - z);

    for(const pos of positions){
      const cells = inWeek.filter(b => b.position === pos);
      const first = cells[0];
      const row = Array(cols).fill('');
      row[COL_DATE] = fmtDate(first.kickoff_at);
      row[COL_GAME] = first.home_team + ' — ' + first.away_team;
      row[COL_RES]  = fmtScore(first.home_score, first.away_score);
      names.forEach((n, i) => {
        const c = cells.find(x => x.display_name === n);
        row[COL_FIRST + i] = c ? fmtScore(c.pred_home, c.pred_away) : '';
      });
      out.push(row);
    }
  }

  /* ---- блок бустів під таблицею ----
     Рендер сам підсвітить клітинку матчу, на який поставлено буст: він
     звіряє назву гри з цього блоку з назвою в таблиці вище. Тобто список
     унизу й підсвітка робляться цим одним блоком. */
  const used = board.filter(b => b.boost_code);
  if(used.length){
    const titleRow = Array(cols).fill('');
    titleRow[COL_GAME] = 'Boosts';
    out.push(titleRow);

    const titleOf = {};
    boostTypes.forEach(t => { titleOf[t.code] = t.title; });
    const order = boostTypes.map(t => t.code).filter(c => used.some(u => u.boost_code === c));

    for(const code of order){
      const ofCode = used.filter(u => u.boost_code === code);
      const depth = Math.max(...names.map(n =>
        ofCode.filter(u => u.display_name === n).length));

      for(let k = 0; k < depth; k++){
        const row = Array(cols).fill('');
        row[COL_RES] = titleOf[code] || code;
        names.forEach((n, i) => {
          const mine = ofCode.filter(u => u.display_name === n);
          const u = mine[k];
          if(!u) return;
          let cell = u.home_team + ' — ' + u.away_team + '\n' +
                     fmtScore(u.pred_home, u.pred_away);
          const second = fmtScore(u.pred_home_2, u.pred_away_2);
          if(second) cell += ' / ' + second;
          row[COL_FIRST + i] = cell;
        });
        out.push(row);
      }
    }
  }
  return out;
}


/* ---------------------------------------------------------------------
   БОНУСНІ ПИТАННЯ окремою вкладкою — як «Bonus questions» на ЧС.

   Рендер шукає колонку з підписами Prediction / Points. Ліворуч від неї
   стоїть правильна відповідь, ще лівіше — текст питання, а імена гравців
   праворуч. Кожне питання займає два рядки: відповіді й бали.
   --------------------------------------------------------------------- */
async function buildSpecialRows(tournamentKey){
  const tours = await sbGet('tournaments?select=id&key=eq.' + tournamentKey);
  if(!tours.length) return [['Бонусні питання цього етапу ще не відкриті']];
  const tid = tours[0].id;

  const bets = await sbGet(
    'special_bets?select=id,position,question,correct_answer' +
    '&tournament_id=eq.' + tid + '&order=position.asc');
  if(!bets.length) return [['Бонусних питань поки немає']];

  const people = await sbGet(
    'participants?select=id,display_name&tournament_id=eq.' + tid +
    '&order=display_name.asc');
  const answers = await sbGet(
    'special_predictions?select=special_bet_id,participant_id,answer');
  const points = await sbGet(
    'special_points?select=special_bet_id,participant_id,points');

  const names = people.map(p => p.display_name);
  registerPlayers(names);

  const COL_Q = 0, COL_ACTUAL = 1, COL_MARK = 2, COL_FIRST = 3;
  const cols = COL_FIRST + names.length;
  const out = [];

  const head = Array(cols).fill('');
  head[COL_Q] = 'Question';
  head[COL_ACTUAL] = 'Final Result';
  names.forEach((n, i) => { head[COL_FIRST + i] = n; });
  out.push(head);

  for(const b of bets){
    const rowA = Array(cols).fill('');
    rowA[COL_Q] = b.question;
    rowA[COL_ACTUAL] = b.correct_answer || '';
    rowA[COL_MARK] = 'Prediction';

    const rowB = Array(cols).fill('');
    rowB[COL_MARK] = 'Points';

    people.forEach((p, i) => {
      const a = answers.find(x => x.special_bet_id === b.id && x.participant_id === p.id);
      const pt = points.find(x => x.special_bet_id === b.id && x.participant_id === p.id);
      rowA[COL_FIRST + i] = a ? a.answer : '';
      rowB[COL_FIRST + i] = pt ? pt.points : '';
    });
    out.push(rowA, rowB);
  }
  return out;
}

/* Точка входу: віддає те саме, що й fetchSheet для архівних турнірів */
async function fetchSupabaseTab(tab){
  LIVE_BOOSTS = true;              // див. boostKind: кольори EuroSeason
  if(tab.source === 'leaderboard') return { rows: await buildLeaderboardRows() };
  if(tab.source === 'month')       return { rows: await buildMonthRows(tab.monthKey) };
  if(tab.source === 'special')     return { rows: await buildSpecialRows(tab.monthKey) };
  if(tab.source === 'rules')       return { rows: buildRulesRows() };
  return { rows: [['Невідома вкладка']] };
}

function clubLogo(name){
  const key = cellStr(name).toLowerCase().replace(/\s+/g,' ').trim();
  const id = CLUB_ID[key];
  if(!id) return '';
  return `<img class="crest" src="https://media.api-sports.io/football/teams/${id}.png" alt="" loading="lazy" width="20" height="20">`;
}

// icon for any team: flag if it's a country, crest if it's a known club, else nothing
function teamIcon(name){
  return flagImg(name) || clubLogo(name);
}

// returns an <img> flag tag for a country name, or '' if not a known country
function flagImg(name){
  const iso = isoForName(name);
  if(!iso) return '';
  return `<img class="flag" src="https://flagcdn.com/24x18/${iso}.png" srcset="https://flagcdn.com/48x36/${iso}.png 2x" alt="" loading="lazy" width="24" height="18">`;
}

// wraps a single team name with its icon (flag or club crest, if known).
function withFlag(name){
  const s = cellStr(name);
  const icon = teamIcon(s);
  return icon ? `<span class="team">${icon}<span>${escapeHtml(s)}</span></span>` : escapeHtml(s);
}

/* Splits "Франція - Марокко" into two team names.
   Preferred form is a dash surrounded by spaces. Some rows come without spaces
   ("ЮАР-Канада") — then we try every dash position and keep the split where BOTH
   halves are recognised teams, so hyphenated names (Кот-д'Івуар, Кабо-Верде)
   stay intact. */
function splitGame(s){
  const spaced = s.split(/\s+[-–—]\s+/);
  if(spaced.length === 2) return [spaced[0].trim(), spaced[1].trim()];
  for(let i = 1; i < s.length - 1; i++){
    if(!'-–—'.includes(s[i])) continue;
    const a = s.slice(0, i).trim(), b = s.slice(i + 1).trim();
    if(a && b && teamIcon(a) && teamIcon(b)) return [a, b];
  }
  return null;
}

function gameWithFlags(game){
  const s = cellStr(game);
  const m = splitGame(s);
  if(m){
    const a = m[0], b = m[1];
    const ia = teamIcon(a), ib = teamIcon(b);
    if(ia || ib){
      return `<span class="game-teams">${ia}<span>${escapeHtml(a)}</span><span class="vs">–</span>${ib}<span>${escapeHtml(b)}</span></span>`;
    }
  }
  return escapeHtml(s);
}

/* ======== DATA (CSV — no type coercion, all cells come as displayed text) ========
   Two sources:
   - gviz (by sheet name): CORS-friendly, but coerces number-dominant columns to
     numeric and DROPS text cells in them (breaks tabs like Play-off bonus points).
   - /export?format=csv&gid=: exact WYSIWYG, no coercion. Used where a gid is set. */
function buildUrl(sheetId, sheetName, gid){
  if(gid !== undefined && gid !== null && gid !== ''){
    return `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
  }
  return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&headers=0&sheet=${encodeURIComponent(sheetName)}`;
}

function parseCSV(text){
  const rows = [];
  let row = [], cur = '', inQ = false;
  for(let i = 0; i < text.length; i++){
    const ch = text[i];
    if(inQ){
      if(ch === '"'){
        if(text[i+1] === '"'){ cur += '"'; i++; }
        else inQ = false;
      } else cur += ch;
    } else {
      if(ch === '"') inQ = true;
      else if(ch === ','){ row.push(cur); cur = ''; }
      else if(ch === '\n'){ row.push(cur); rows.push(row); row = []; cur = ''; }
      else if(ch === '\r'){ /* skip */ }
      else cur += ch;
    }
  }
  row.push(cur);
  rows.push(row);
  return rows;
}
